<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitstop Portal — 대시보드 v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #ffffff;
  --surface:    #f8f9fa;
  --surface2:   #f1f3f5;
  --border:     #e5e7eb;
  --border-mid: #d1d5db;
  --text-pri:   #111827;
  --text-sec:   #4b5563;
  --text-dim:   #9ca3af;
  --mono:       'Noto Sans Mono', monospace;
  --sans:       'Noto Sans KR', sans-serif;
  --r:          4px;

  --c-green:    #16a34a;
  --bg-green:   #dcfce7;
  --c-yellow:   #ca8a04;
  --bg-yellow:  #fef9c3;
  --c-red:      #dc2626;
  --bg-red:     #fee2e2;
  --c-orange:   #ea580c;
  --bg-orange:  #ffedd5;
  --c-unknown:  #9ca3af;
  --bg-unknown: #f3f4f6;

  /* v3 추가 토큰 */
  --verdict-red-bg:    #fff0f0;
  --verdict-yellow-bg: #fffbeb;
  --verdict-green-bg:  #f0fdf4;
  --divider-bg:        #f1f3f5;
  --flag-critical-bg:  #fee2e2;
  --flag-critical-fg:  #dc2626;
  --flag-high-bg:      #ffedd5;
  --flag-high-fg:      #ea580c;
  --flag-medium-bg:    #fef9c3;
  --flag-medium-fg:    #ca8a04;
  --bar-critical:      #dc2626;
  --bar-warning:       #ea580c;
  --bar-normal:        #16a34a;
  --gate-pass:         #16a34a;
  --gate-warn:         #ca8a04;
  --gate-fail:         #dc2626;
  --gate-blank:        #9ca3af;
}

html, body { height: 100%; background: var(--bg); color: var(--text-pri); font-family: var(--sans); font-size: 13px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

::-webkit-scrollbar        { width: 5px; height: 5px; }
::-webkit-scrollbar-track  { background: var(--surface); }
::-webkit-scrollbar-thumb  { background: var(--border-mid); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* ─── Layout ─────────────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* ─── Topbar ─────────────────────────────────────────────────────── */
.topbar { display: flex; align-items: center; gap: 10px; padding: 0 20px; height: 46px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
.tb-logo { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); font-weight: 500; }
.tb-sep { color: var(--border-mid); }
.tb-page { font-size: 12px; font-weight: 500; color: var(--text-sec); }
.tb-badge { font-family: var(--mono); font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; padding: 2px 7px; border: 1px solid var(--border-mid); color: var(--text-dim); border-radius: 3px; }
.tb-spacer { flex: 1; }
.tb-sub { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; }

/* ─── Body ───────────────────────────────────────────────────────── */
.body { flex: 1; display: flex; overflow: hidden; }

/* ─── Sidebar ────────────────────────────────────────────────────── */
.sidebar { width: 280px; flex-shrink: 0; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-head { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sh-label { font-family: var(--mono); font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
.sh-count { font-size: 12px; color: var(--text-sec); }
.sh-count strong { color: var(--text-pri); font-weight: 600; }

.company-list { flex: 1; overflow-y: auto; padding: 6px 0; }

.ci-section-label { font-family: var(--mono); font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); padding: 10px 16px 4px; border-bottom: 1px solid var(--border); }

.company-item { display: flex; align-items: center; gap: 9px; padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; position: relative; }
.company-item:last-child { border-bottom: none; }
.company-item:hover { background: var(--surface2); }
.company-item.active { background: #fff; }
.company-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--text-pri); }

.ci-idx { font-family: var(--mono); font-size: 9px; color: var(--text-dim); width: 16px; text-align: right; flex-shrink: 0; }
.ci-body { flex: 1; min-width: 0; }
.ci-name { font-size: 12px; font-weight: 500; color: var(--text-pri); white-space: nowrap; margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
.ci-meta { font-size: 9px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-ts { text-align: right; flex-shrink: 0; margin-left: 6px; }
.ci-ts-date { font-size: 10px; color: var(--text-sec); }
.ci-ts-time { font-size: 9px; color: var(--text-dim); }
.badge-closed { font-size: 8px; color: #999; background: #333; padding: 1px 5px; border-radius: 3px; font-weight: 500; letter-spacing: 0.03em; flex-shrink: 0; }

.ci-verdict { display: inline-flex; align-items: center; gap: 3px; font-size: 8px; padding: 1px 6px; border-radius: 3px; font-weight: 500; flex-shrink: 0; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
.ci-verdict .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.ci-verdict.v-red    { background: var(--bg-red);    color: var(--c-red); }
.ci-verdict.v-red .dot { background: var(--c-red); }
.ci-verdict.v-yellow { background: var(--bg-yellow); color: var(--c-yellow); }
.ci-verdict.v-yellow .dot { background: var(--c-yellow); }
.ci-verdict.v-green  { background: var(--bg-green);  color: var(--c-green); }
.ci-verdict.v-green .dot { background: var(--c-green); }

.company-item.is-closed .ci-name span:first-child { color: var(--text-dim); }
.company-item.is-closed .ci-meta,
.company-item.is-closed .ci-ts-date,
.company-item.is-closed .ci-ts-time,
.company-item.is-closed .ci-idx { opacity: 0.5; }

/* grade-badge (shared) */
.grade-badge { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 8px; letter-spacing: 0.04em; padding: 2px 7px 2px 6px; border-radius: 3px; flex-shrink: 0; line-height: 1.4; font-weight: 500; }
.grade-badge .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.grade-badge.gb-green   { background: var(--bg-green);   color: var(--c-green);   }
.grade-badge.gb-green .dot { background: var(--c-green); }
.grade-badge.gb-yellow  { background: var(--bg-yellow);  color: var(--c-yellow);  }
.grade-badge.gb-yellow .dot { background: var(--c-yellow); }
.grade-badge.gb-red     { background: var(--bg-red);     color: var(--c-red);     }
.grade-badge.gb-red .dot { background: var(--c-red); }
.grade-badge.gb-orange  { background: var(--bg-orange);  color: var(--c-orange);  }
.grade-badge.gb-orange .dot { background: var(--c-orange); }
.grade-badge.gb-unknown { background: var(--bg-unknown); color: var(--c-unknown); }
.grade-badge.gb-unknown .dot { background: var(--c-unknown); }

/* ─── Main area ─────────────────────────────────────────────────── */
.main { flex: 1; overflow-y: auto; background: var(--bg); }
.dashboard { padding: 0 0 64px; }

/* ─── Empty / Loading / Error ────────────────────────────────────── */
.empty-state, .loading-state, .error-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--text-dim); }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--text-dim); border-radius: 50%; animation: spin 0.75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; color: var(--text-dim); }
.error-title { font-family: var(--mono); font-size: 11px; color: var(--c-red); letter-spacing: 0.1em; }
.error-msg { font-size: 12px; color: var(--text-sec); max-width: 360px; text-align: center; }
.error-hint { font-family: var(--mono); font-size: 10px; color: var(--text-dim); background: var(--surface); border: 1px solid var(--border); padding: 8px 14px; border-radius: var(--r); max-width: 420px; word-break: break-all; text-align: left; }

/* ─── Section structure ──────────────────────────────────────────── */
.section-divider { height: 6px; background: var(--surface2); margin: 0; }
.dash-section { padding: 24px 24px 20px; }
.section-label { font-family: var(--mono); font-size: 8px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-dim); margin-bottom: 4px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--text-pri); margin-bottom: 4px; }
.section-sub { font-size: 12px; color: var(--text-sec); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

/* ─── A. Company Header ───────────────────────────────────────────── */
.co-header { padding: 18px 24px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
.co-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 10px; }
.co-header-left { flex: 1; min-width: 0; }
.co-name { font-size: 16px; font-weight: 600; color: var(--text-pri); margin-bottom: 2px; }
.co-desc { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
.co-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.co-stat-pill { font-family: var(--mono); font-size: 10px; color: var(--text-sec); background: var(--surface); border: 1px solid var(--border); padding: 3px 9px; border-radius: 3px; }
.co-stat-pill strong { color: var(--text-pri); font-weight: 600; }
.co-stat-pill.stat-pill-alert { border-color: var(--c-red); color: var(--c-red); background: var(--bg-red); }
.co-stat-pill.stat-pill-warn  { border-color: #fde68a; color: var(--c-yellow); background: var(--bg-yellow); }
.co-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.btn-rm { display: inline-flex; align-items: center; gap: 5px; background: var(--text-pri); border: none; color: #fff; font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 14px; cursor: pointer; border-radius: var(--r); text-decoration: none; transition: opacity 0.1s; white-space: nowrap; flex-shrink: 0; }
.btn-rm:hover { opacity: 0.8; }
.btn-rm-sec { background: var(--surface); border: 1px solid var(--border); color: var(--text-sec); }
.btn-rm-sec:hover { background: var(--surface2); opacity: 1; }

/* Stage bar */
.stage-bar { display: flex; align-items: center; gap: 0; margin-top: 12px; }
.stage-item { display: flex; align-items: center; flex: 1; }
.stage-node { font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--text-dim); background: var(--surface2); border: 1px solid var(--border); padding: 3px 8px; border-radius: 3px; white-space: nowrap; transition: all 0.1s; }
.stage-node.current { background: var(--text-pri); border-color: var(--text-pri); color: #fff; }
.stage-node.done { background: var(--bg-green); border-color: var(--c-green); color: var(--c-green); }
.stage-node.closed-st { background: var(--bg-unknown); border-color: var(--border-mid); color: var(--text-dim); }
.stage-line { flex: 1; height: 1px; background: var(--border-mid); min-width: 8px; }
.stage-line.done { background: var(--c-green); }

/* ─── B. Verdict Strip ────────────────────────────────────────────── */
.verdict-strip { padding: 14px 20px; display: flex; align-items: flex-start; gap: 14px; }
.verdict-strip.vs-red    { background: var(--verdict-red-bg);    border-left: 4px solid var(--c-red); }
.verdict-strip.vs-yellow { background: var(--verdict-yellow-bg); border-left: 4px solid var(--c-yellow); }
.verdict-strip.vs-green  { background: var(--verdict-green-bg);  border-left: 4px solid var(--c-green); }
.verdict-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.verdict-dot.vd-red    { background: var(--c-red); }
.verdict-dot.vd-yellow { background: var(--c-yellow); }
.verdict-dot.vd-green  { background: var(--c-green); }
.verdict-label { font-family: var(--mono); font-size: 11px; font-weight: 500; text-transform: uppercase; margin-bottom: 2px; }
.verdict-label.vl-red    { color: var(--c-red); }
.verdict-label.vl-yellow { color: var(--c-yellow); }
.verdict-label.vl-green  { color: var(--c-green); }
.verdict-summary { font-size: 13px; font-weight: 600; color: var(--text-pri); }
.verdict-detail  { font-size: 12px; color: var(--text-sec); margin-top: 2px; }

/* ─── C. Gate Panel ──────────────────────────────────────────────── */
.gate-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
@media (max-width: 1100px) { .gate-grid { grid-template-columns: repeat(4, 1fr); } }

.gate-card { border: 1px solid var(--border); border-radius: var(--r); background: var(--surface); padding: 12px 13px 10px; border-top-width: 3px; }
.gate-card.gc-red    { border-top-color: var(--c-red); }
.gate-card.gc-yellow { border-top-color: var(--c-yellow); }
.gate-card.gc-green  { border-top-color: var(--c-green); }
.gate-card.gc-unknown { border-top-color: var(--c-unknown); }

.gate-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.gate-id { font-family: var(--mono); font-size: 9px; text-transform: uppercase; color: var(--text-dim); }
.gate-icon { font-size: 14px; line-height: 1; }
.gate-name { font-size: 11px; font-weight: 600; color: var(--text-pri); margin-bottom: 4px; }
.gate-finding { font-size: 11px; color: var(--text-sec); line-height: 1.5; }
.gate-finding.tbd { font-style: italic; color: var(--text-dim); }

/* ─── D. Findings Strip ──────────────────────────────────────────── */
.findings-list { list-style: none; }
.finding-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.finding-item:last-child { border-bottom: none; }
.finding-no { font-family: var(--mono); font-size: 10px; color: var(--text-dim); min-width: 20px; text-align: right; flex-shrink: 0; padding-top: 1px; }
.finding-text { font-size: 12px; color: var(--text-sec); flex: 1; }
.finding-text strong { font-family: var(--mono); font-weight: 600; color: var(--text-pri); }

/* ─── E. Financials ──────────────────────────────────────────────── */
.fin-tabs { display: flex; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); }
.fin-tab { font-family: var(--mono); font-size: 10px; color: var(--text-dim); padding: 8px 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.1s; white-space: nowrap; }
.fin-tab:hover { color: var(--text-sec); }
.fin-tab.active { color: var(--text-pri); border-bottom-color: var(--text-pri); }
.fin-pane { display: none; padding: 16px 0; }
.fin-pane.active { display: block; }

/* Fin table */
.fin-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.fin-table thead th { font-family: var(--mono); font-size: 9px; text-transform: uppercase; color: var(--text-dim); padding: 6px 10px; border-bottom: 2px solid var(--border-mid); text-align: right; white-space: nowrap; }
.fin-table thead th:first-child { text-align: left; }
.fin-table tbody td { padding: 7px 10px; border-bottom: 1px solid var(--border); font-family: var(--mono); text-align: right; }
.fin-table tbody td:first-child { font-family: var(--sans); font-weight: 500; color: var(--text-sec); text-align: left; }
.fin-table tbody tr:hover { background: var(--surface); }
.fin-table tbody tr.row-group { border-top: 2px solid var(--border-mid); }
.fin-table tbody tr.row-subtotal td { font-weight: 600; background: var(--surface); }
.fin-table tbody tr.row-alert td { background: #fff8f8; font-weight: 600; }
.fin-table tbody tr.row-gov td:first-child { background: var(--bg-yellow); font-weight: 600; }
.fin-table tbody tr.row-loan td:first-child { background: var(--bg-orange); }
.fin-table tbody tr.row-legal td:first-child { background: var(--bg-orange); }
.fin-table tbody tr.row-current { font-weight: 700; border-left: 3px solid var(--text-pri); }
.fin-table .num-neg { color: var(--c-red); }
.fin-table .num-pos { color: var(--c-green); }
.fin-table .num-alert { color: var(--c-red); background: var(--bg-red); font-weight: 600; }
.fin-table .cell-ocf-neg { background: #fff8f8; }
.fin-table .cell-ocf-pos { background: #f0fdf4; }
.fin-table .cell-subsidy { background: var(--bg-yellow); }
.fin-table .trend { font-family: var(--sans); font-size: 11px; color: var(--text-sec); text-align: left; }
.fin-table.compact { font-size: 11px; }
.fin-table.compact td, .fin-table.compact th { padding: 5px 8px; }

/* Cash KPI card */
.cash-kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 18px; margin-bottom: 16px; display: flex; gap: 32px; align-items: flex-start; }
.cash-kpi-item {}
.cash-kpi-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 2px; }
.cash-kpi-value { font-family: var(--mono); font-size: 20px; font-weight: 600; line-height: 1.2; color: var(--text-pri); }
.cash-kpi-value.kv-red { color: var(--c-red); }
.cash-kpi-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* Mini bar chart */
.bar-chart-wrap { margin-bottom: 16px; overflow-x: auto; }
.bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 100px; padding: 0 4px; }
.bar-col { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 28px; }
.bar-val { font-family: var(--mono); font-size: 8px; color: var(--text-dim); white-space: nowrap; }
.bar-bar { width: 20px; border-radius: 2px 2px 0 0; transition: opacity 0.15s; }
.bar-bar:hover { opacity: 0.75; }
.bar-bar.bc-critical { background: var(--bar-critical); }
.bar-bar.bc-warning  { background: var(--bar-warning); }
.bar-bar.bc-normal   { background: var(--bar-normal); }
.bar-label { font-family: var(--mono); font-size: 8px; color: var(--text-dim); writing-mode: vertical-rl; transform: rotate(180deg); white-space: nowrap; max-height: 40px; overflow: hidden; }

/* BEP KPI grid */
.bep-kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.bep-kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); border-top: 3px solid var(--border-mid); padding: 12px 14px; }
.bep-kpi-card.bk-red    { border-top-color: var(--c-red); }
.bep-kpi-card.bk-yellow { border-top-color: var(--c-yellow); }
.bep-kpi-card.bk-green  { border-top-color: var(--c-green); }
.bep-kpi-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.08em; margin-bottom: 4px; }
.bep-kpi-val { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--text-pri); line-height: 1.2; margin-bottom: 4px; }
.bep-kpi-val.bv-red { color: var(--c-red); }
.bep-kpi-badge { font-family: var(--mono); font-size: 8px; font-weight: 500; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; }
.bep-kpi-badge.bb-critical { background: var(--bg-red);    color: var(--c-red); }
.bep-kpi-badge.bb-warning  { background: var(--bg-yellow); color: var(--c-yellow); }
.bep-kpi-badge.bb-normal   { background: var(--bg-green);  color: var(--c-green); }

/* ─── F. Red Flags ───────────────────────────────────────────────── */
.flag-section { margin-bottom: 20px; }
.flag-section-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.flag-severity-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.flag-severity-label { font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; }
.flag-count { font-family: var(--mono); font-size: 9px; color: var(--text-dim); }
.flag-card { border-left: 4px solid transparent; padding: 10px 14px; border-radius: 0 var(--r) var(--r) 0; margin-bottom: 8px; }
.flag-card.fc-critical { border-left-color: var(--c-red);    background: var(--flag-critical-bg); }
.flag-card.fc-high     { border-left-color: var(--c-orange);  background: var(--flag-high-bg); }
.flag-card.fc-medium   { border-left-color: var(--c-yellow);  background: var(--flag-medium-bg); }
.flag-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.flag-badge { font-family: var(--mono); font-size: 8px; font-weight: 500; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.08em; }
.flag-badge.fb-critical { background: var(--c-red);    color: #fff; }
.flag-badge.fb-high     { background: var(--c-orange);  color: #fff; }
.flag-badge.fb-medium   { background: var(--c-yellow);  color: #fff; }
.flag-no { font-family: var(--mono); font-size: 9px; color: var(--text-dim); }
.flag-title { font-size: 12px; font-weight: 600; color: var(--text-pri); }
.flag-body { font-size: 12px; color: var(--text-sec); line-height: 1.6; white-space: pre-wrap; }
.flag-body strong { font-family: var(--mono); font-weight: 600; color: var(--text-pri); }

/* ─── G. BEP Scenario ────────────────────────────────────────────── */
.bep-scenario-badge { display: inline-block; font-family: var(--mono); font-size: 8px; font-weight: 500; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
.bep-scenario-badge.feasible   { background: var(--bg-green);  color: var(--c-green); }
.bep-scenario-badge.conditional{ background: var(--bg-yellow); color: var(--c-yellow); }
.bep-scenario-badge.impossible { background: var(--bg-red);    color: var(--c-red); }
.bep-warn-box { border: 1px solid var(--c-red); border-radius: var(--r); padding: 10px 14px; margin-top: 12px; font-size: 12px; color: var(--c-red); background: var(--bg-red); }

/* ─── H. KHK Decision ───────────────────────────────────────────── */
.khk-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.khk-col { border: 1px solid var(--border); border-radius: var(--r); padding: 14px; border-top: 3px solid transparent; }
.khk-col.khk-go   { border-top-color: var(--c-green); }
.khk-col.khk-nogo { border-top-color: var(--c-red); }
.khk-col.khk-hold { border-top-color: var(--c-yellow); }
.khk-col-head { font-family: var(--mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
.khk-col-head.kh-go   { color: var(--c-green); }
.khk-col-head.kh-nogo { color: var(--c-red); }
.khk-col-head.kh-hold { color: var(--c-yellow); }
.khk-list { list-style: none; }
.khk-list li { font-size: 12px; color: var(--text-sec); padding: 5px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
.khk-list li:last-child { border-bottom: none; }
.khk-list li::before { content: attr(data-no); font-family: var(--mono); font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
.khk-quote { font-family: var(--mono); font-size: 11px; color: var(--text-dim); font-style: italic; border-left: 2px solid var(--border-mid); padding-left: 8px; margin-top: 8px; line-height: 1.5; }

/* ─── I. Next Actions ────────────────────────────────────────────── */
.action-flowchart { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-top: 16px; font-family: var(--mono); font-size: 11px; color: var(--text-sec); white-space: pre; overflow-x: auto; }
.action-owner-badge { display: inline-block; font-family: var(--mono); font-size: 9px; padding: 2px 6px; border-radius: 3px; }
.action-owner-badge.ob-kyi { background: var(--surface2); color: var(--text-sec); }
.action-owner-badge.ob-khk { background: var(--bg-yellow); color: var(--c-yellow); }
.action-deadline { font-family: var(--mono); font-size: 11px; }
.action-deadline.dl-urgent { color: var(--c-red); font-weight: 600; }

/* ─── J. Email Draft ─────────────────────────────────────────────── */
.collapsible-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); user-select: none; }
.collapsible-header:hover { background: var(--surface2); }
.collapsible-title { font-size: 12px; font-weight: 600; color: var(--text-sec); }
.collapsible-toggle { font-family: var(--mono); font-size: 9px; color: var(--text-dim); transition: transform 0.2s; }
.collapsible.open .collapsible-toggle { transform: rotate(90deg); }
.collapsible-body { display: none; margin-top: 8px; }
.collapsible.open .collapsible-body { display: block; }
.email-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 20px; }
.email-text { font-size: 12px; color: var(--text-sec); white-space: pre-wrap; line-height: 1.8; font-family: var(--sans); }
.email-actions { display: flex; justify-content: flex-end; margin-bottom: 8px; }
.btn-copy { font-family: var(--mono); font-size: 9px; padding: 5px 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text-sec); cursor: pointer; border-radius: var(--r); transition: background 0.1s; }
.btn-copy:hover { background: var(--surface2); }

/* ─── IR Analysis ────────────────────────────────────────────────── */
.ir-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.ir-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
.ir-card-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; letter-spacing: 0.1em; }
.ir-product-name { font-size: 12px; font-weight: 600; color: var(--text-pri); margin-bottom: 4px; }
.ir-product-desc { font-size: 11px; color: var(--text-sec); line-height: 1.5; margin-bottom: 6px; }
.ir-product-metrics { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
.ir-team-list { list-style: none; }
.ir-team-list li { font-size: 12px; color: var(--text-sec); padding: 4px 0; border-bottom: 1px solid var(--border); }
.ir-team-list li:last-child { border-bottom: none; }
.ir-market { font-family: var(--mono); font-size: 12px; color: var(--text-pri); }

/* Closed company view */
.closed-view { padding: 32px 24px; }
.closed-header { font-family: var(--mono); font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.14em; margin-bottom: 12px; }
.closed-summary { font-size: 13px; color: var(--text-sec); line-height: 1.7; max-width: 600px; margin-bottom: 20px; }
.screener-meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.screener-meta-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; }
.screener-meta-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 2px; }
.screener-meta-value { font-size: 12px; font-weight: 500; color: var(--text-pri); }
.close-reason-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; font-size: 12px; color: var(--text-sec); line-height: 1.6; }

/* Headcount KPI */
.headcount-kpi { display: flex; gap: 24px; margin-bottom: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 16px; }
.hc-kpi-item {}
.hc-kpi-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 2px; }
.hc-kpi-value { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--text-pri); }
.hc-kpi-sub { font-size: 11px; color: var(--text-dim); }

/* No data placeholder */
.no-data { font-size: 12px; color: var(--text-dim); font-style: italic; padding: 12px 0; }

/* Utility */
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
</style>
</head>
<body>
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <span class="tb-logo">Pitstop Portal</span>
    <span class="tb-sep">·</span>
    <span class="tb-page">대시보드 v3</span>
    <span class="tb-badge">INTERNAL</span>
    <span class="tb-spacer"></span>
    <span class="tb-sub" id="tb-date"></span>
  </div>

  <div class="body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="sh-label">Pipeline</div>
        <div class="sh-count" id="sh-count">로딩 중...</div>
      </div>
      <div class="company-list" id="company-list"></div>
    </div>

    <!-- Main -->
    <div class="main" id="main">
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">데이터 로딩 중...</div>
      </div>
      <div id="dashboard" class="dashboard" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   DATA & STATE
═══════════════════════════════════════════════════════════════════ */
let ALL_COMPANIES = [];
let SELECTED_ID   = null;

/* ═══════════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════════ */
function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function fmtDateFull(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function verdictClass(v) {
  if (!v) return '';
  const m = { RED: 'v-red', YELLOW: 'v-yellow', GREEN: 'v-green' };
  return m[v.toUpperCase()] || 'v-green';
}

function verdictStripClass(v) {
  if (!v) return '';
  const m = { RED: 'vs-red', YELLOW: 'vs-yellow', GREEN: 'vs-green' };
  return m[v.toUpperCase()] || '';
}

function gateStatusIcon(s) {
  const m = { red: '❌', warning: '⚠️', green: '✅', unknown: '⬜', fail: '❌', warn: '⚠️', pass: '✅', tbd: '⬜' };
  return m[(s||'').toLowerCase()] || '⬜';
}

function gateCardClass(s) {
  const m = { red: 'gc-red', warning: 'gc-yellow', green: 'gc-green', unknown: 'gc-unknown', fail: 'gc-red', warn: 'gc-yellow', pass: 'gc-green', tbd: 'gc-unknown' };
  return m[(s||'').toLowerCase()] || 'gc-unknown';
}

function isNeg(val) {
  if (typeof val === 'string') return val.trim().startsWith('-');
  return val < 0;
}

function numClass(val) {
  if (!val && val !== 0) return '';
  const s = String(val).trim();
  if (s.startsWith('-')) return 'num-neg';
  if (s.startsWith('+')) return 'num-pos';
  return '';
}

function feasibilityBadge(text) {
  if (!text) return '';
  const t = text.toLowerCase();
  let cls = 'conditional';
  if (t.includes('비현실')) cls = 'impossible';
  else if (t.includes('가능') && !t.includes('조건')) cls = 'feasible';
  return `<span class="bep-scenario-badge ${cls}">${esc(text.slice(0,6))}</span>`;
}

/* ═══════════════════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════════════════ */
function buildSidebar(companies) {
  const active  = companies.filter(c => c.status !== 'closed');
  const closed  = companies.filter(c => c.status === 'closed');

  // Sort active by survey_timestamp desc
  active.sort((a,b) => {
    const ta = (a.meta && a.meta.survey_timestamp) || (a._screener && a._screener.survey_timestamp) || '';
    const tb = (b.meta && b.meta.survey_timestamp) || (b._screener && b._screener.survey_timestamp) || '';
    return tb.localeCompare(ta);
  });

  const el = document.getElementById('company-list');
  const count = document.getElementById('sh-count');
  count.innerHTML = `진행 <strong>${active.length}</strong>사 · 종료 <strong>${closed.length}</strong>사`;

  let html = '';
  let idx = 1;

  if (active.length) {
    html += `<div class="ci-section-label">진행 (${active.length})</div>`;
    active.forEach(c => {
      html += buildCompanyItem(c, idx++, false);
    });
  }
  if (closed.length) {
    html += `<div class="ci-section-label" style="margin-top:4px;">종료 (${closed.length})</div>`;
    closed.forEach(c => {
      html += buildCompanyItem(c, idx++, true);
    });
  }

  el.innerHTML = html;
  el.querySelectorAll('.company-item').forEach(item => {
    item.addEventListener('click', () => selectCompany(item.dataset.id));
  });
}

function buildCompanyItem(c, idx, isClosed) {
  const vl = (c.overall_verdict || '').toUpperCase();
  const vcls = verdictClass(vl);
  const ts = (c.meta && c.meta.survey_timestamp) || (c._screener && c._screener.survey_timestamp) || '';

  return `
<div class="company-item${isClosed ? ' is-closed' : ''}" data-id="${esc(c.id)}">
  <div class="ci-idx">${idx}</div>
  <div class="ci-body">
    <div class="ci-name">
      <span>${esc(c.name)}</span>
      ${isClosed ? '<span class="badge-closed">CLOSED</span>' : ''}
      ${vl ? `<span class="ci-verdict ${vcls}"><span class="dot"></span>${vl}</span>` : ''}
    </div>
    <div class="ci-meta">${esc(c.stage_label || c.stage || '')}${c.meta && c.meta.ceo ? ' · ' + c.meta.ceo : ''}</div>
  </div>
  <div class="ci-ts">
    <div class="ci-ts-date">${fmtDate(ts)}</div>
  </div>
</div>`;
}

function setActiveSidebar(id) {
  document.querySelectorAll('.company-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
}

/* ═══════════════════════════════════════════════════════════════════
   SELECT COMPANY
═══════════════════════════════════════════════════════════════════ */
function selectCompany(id) {
  SELECTED_ID = id;
  const c = ALL_COMPANIES.find(x => x.id === id);
  if (!c) return;
  setActiveSidebar(id);
  const dash = document.getElementById('dashboard');
  dash.innerHTML = renderDashboard(c);
  dash.style.display = 'block';
  document.getElementById('main').scrollTop = 0;

  // Bind tab switching
  dash.querySelectorAll('.fin-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      dash.querySelectorAll('.fin-tab').forEach(t => t.classList.remove('active'));
      dash.querySelectorAll('.fin-pane').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      const pane = dash.querySelector(`#${tab.dataset.pane}`);
      if (pane) pane.classList.add('active');
    });
  });

  // Bind email collapsible
  dash.querySelectorAll('.collapsible-header').forEach(hdr => {
    hdr.addEventListener('click', () => {
      hdr.closest('.collapsible').classList.toggle('open');
    });
  });

  // Bind email copy
  const copyBtn = dash.querySelector('#btn-copy-email');
  if (copyBtn) {
    copyBtn.addEventListener('click', () => {
      const txt = dash.querySelector('.email-text');
      if (txt) {
        navigator.clipboard.writeText(txt.innerText).then(() => {
          copyBtn.textContent = '복사됨 ✓';
          setTimeout(() => { copyBtn.textContent = '복사 ↗'; }, 2000);
        });
      }
    });
  }
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER DASHBOARD
═══════════════════════════════════════════════════════════════════ */
function renderDashboard(c) {
  if (c.status === 'closed') {
    return renderClosed(c);
  }
  return renderActive(c);
}

/* ─── Closed company ─────────────────────────────────────────────── */
function renderClosed(c) {
  const s = c._screener || {};
  const vl = (c.overall_verdict || '').toUpperCase();
  const vcls = verdictClass(vl);

  let html = `
    <!-- A. Company Header (minimal) -->
    ${renderHeader(c)}
    <div class="section-divider"></div>

    <div class="closed-view">
      <div class="closed-header">종료된 딜 — ${esc(c.stage_label || 'CLOSED')}</div>`;

  if (c.verdict_summary) {
    html += `<div class="closed-summary">${esc(c.verdict_summary)}</div>`;
  }

  if (s.close_reason) {
    html += `<div class="screener-meta-label" style="font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;">종료 사유</div>
    <div class="close-reason-box">${esc(s.close_reason)}</div>`;
  }

  // Screener summary
  if (s.cash_kpi || s.cf_trends) {
    html += `<div style="margin-top:20px;font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--text-dim);letter-spacing:0.14em;margin-bottom:10px;">스크리너 요약</div>`;

    if (s.cash_kpi) {
      html += `<div class="screener-meta-grid">
        <div class="screener-meta-card"><div class="screener-meta-label">현금 잔고</div><div class="screener-meta-value">${esc(s.cash_kpi.current_balance_eok || s.cash_kpi.cash_mtd || '—')}억</div></div>
        <div class="screener-meta-card"><div class="screener-meta-label">월 Burn</div><div class="screener-meta-value">${esc(s.cash_kpi.monthly_burn || '—')}억</div></div>
        <div class="screener-meta-card"><div class="screener-meta-label">런웨이</div><div class="screener-meta-value">${esc(s.cash_kpi.runway_months || '—')}개월</div></div>
      </div>`;
    }

    // Financial history table
    if (s.cf_trends && s.cf_trends.financial_history && s.cf_trends.financial_history.length) {
      html += `<table class="fin-table" style="margin-top:8px;"><thead><tr>
        <th>회계연도</th><th>매출(억)</th><th>영업이익(억)</th>
      </tr></thead><tbody>`;
      s.cf_trends.financial_history.forEach(r => {
        const opCls = r.op_eok < 0 ? 'num-neg' : 'num-pos';
        html += `<tr>
          <td>${esc(r.fiscal_year)}</td>
          <td>${esc(r.sales_eok)}</td>
          <td class="${opCls}">${r.op_eok >= 0 ? '+' : ''}${esc(r.op_eok)}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
    }

    // Mezzanine 3축
    if (s.mezzanine) {
      html += `<div style="margin-top:16px;font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--text-dim);letter-spacing:0.14em;margin-bottom:8px;">메자닌 3축</div>`;
      html += `<div class="screener-meta-grid" style="grid-template-columns:repeat(4,1fr);">`;
      Object.values(s.mezzanine).forEach(m => {
        const gbcls = m.grade === 'green' ? 'gb-green' : m.grade === 'red' ? 'gb-red' : m.grade === 'yellow' ? 'gb-yellow' : 'gb-unknown';
        html += `<div class="screener-meta-card">
          <div class="screener-meta-label">${esc(m.name)}</div>
          <div style="margin-top:4px;"><span class="grade-badge ${gbcls}"><span class="dot"></span>${esc((m.grade||'?').toUpperCase())}</span></div>
          <div style="font-size:11px;color:var(--text-sec);margin-top:4px;">${esc(m.detail||'')}</div>
        </div>`;
      });
      html += `</div>`;
    }
  } else {
    html += `<div class="no-data" style="margin-top:20px;">분석 데이터 없음 — 종료된 딜입니다.</div>`;
  }

  html += `</div>`;
  return html;
}

/* ─── Active company (full dashboard) ───────────────────────────── */
function renderActive(c) {
  let html = '';

  // A. Header
  html += renderHeader(c);

  // B. Verdict
  if (c.overall_verdict) {
    html += renderVerdict(c);
  }

  // C. Gates
  if (c.gates && c.gates.length) {
    html += `<div class="section-divider"></div>`;
    html += renderGates(c);
  }

  // D. Findings
  if (c.new_findings && c.new_findings.length) {
    html += `<div class="section-divider"></div>`;
    html += renderFindings(c);
  }

  // E. Financials
  const fin = c.financials || {};
  const hasFin = fin.bs_summary || fin.cash_balance || fin.cash_flow_dw || fin.cash_flow_submitted || fin.headcount;
  if (hasFin) {
    html += `<div class="section-divider"></div>`;
    html += renderFinancials(c);
  }

  // IR Analysis (between E and F)
  const ir = c.ir_analysis || {};
  const hasIR = (ir.products && ir.products.length) || (ir.team && ir.team.length) || ir.market || (ir.discrepancies && ir.discrepancies.length);
  if (hasIR) {
    html += `<div class="section-divider"></div>`;
    html += renderIRAnalysis(c);
  }

  // F. Red Flags
  if (c.red_flags && c.red_flags.length) {
    html += `<div class="section-divider"></div>`;
    html += renderRedFlags(c);
  }

  // G. BEP Scenario
  const bep = c.bep || {};
  if (bep.current_state || bep.scenarios || bep.runway_with_investment) {
    html += `<div class="section-divider"></div>`;
    html += renderBEP(c);
  }

  // H. KHK Decision
  const khk = c.khk_preview || {};
  if ((khk.go && khk.go.length) || (khk.nogo && khk.nogo.length) || (khk.hold && khk.hold.length)) {
    html += `<div class="section-divider"></div>`;
    html += renderKHK(c);
  }

  // I. Next Actions
  if (c.actions && c.actions.length) {
    html += `<div class="section-divider"></div>`;
    html += renderActions(c);
  }

  // J. Email Draft
  if (c.email_draft) {
    html += `<div class="section-divider"></div>`;
    html += renderEmailDraft(c);
  }

  return html;
}

/* ─── A. Header ─────────────────────────────────────────────────── */
function renderHeader(c) {
  const m = c.meta || {};
  const vl = (c.overall_verdict || '').toUpperCase();

  // Stage bar
  const stages = [
    { key: 'stage_1', label: 'S1 서류' },
    { key: 'stage_2', label: 'S2 서면확인' },
    { key: 'stage_3', label: 'S3 사전미팅' },
    { key: 'closed',  label: 'CLOSED' },
  ];
  const currentStage = c.stage || '';
  const stageOrder = ['stage_1','stage_2','stage_3','closed'];
  const currentIdx = stageOrder.indexOf(currentStage);

  let stageHtml = '<div class="stage-bar">';
  stages.forEach((s, i) => {
    const isDone    = currentStage !== 'closed' && i < currentIdx;
    const isCurrent = s.key === currentStage || (currentStage === 'closed' && i === stages.length - 1);
    const cls = isCurrent ? (currentStage === 'closed' ? 'stage-node closed-st' : 'stage-node current') : isDone ? 'stage-node done' : 'stage-node';
    stageHtml += `<div class="stage-item">`;
    stageHtml += `<span class="${cls}">${esc(s.label)}</span>`;
    if (i < stages.length - 1) {
      stageHtml += `<span class="stage-line${isDone ? ' done' : ''}"></span>`;
    }
    stageHtml += `</div>`;
  });
  stageHtml += '</div>';

  // Pills
  let pills = '';
  if (m.ceo)              pills += `<span class="co-stat-pill">CEO <strong>${esc(m.ceo)}</strong></span>`;
  if (m.founded)          pills += `<span class="co-stat-pill">설립 <strong>${esc(m.founded)}</strong></span>`;
  if (m.investment_total) pills += `<span class="co-stat-pill">누적투자 <strong>${esc(m.investment_total)}</strong></span>`;
  if (m.gowid_grade)      pills += `<span class="co-stat-pill">${esc(m.gowid_grade)}</span>`;
  if (m.delinquency)      pills += `<span class="co-stat-pill stat-pill-alert">${esc(m.delinquency)}</span>`;

  // CF RM button
  let cfBtn = '';
  if (m.cf_url) {
    cfBtn = `<a href="${esc(m.cf_url)}" target="_blank" class="btn-rm">CF RM ↗</a>`;
  } else if (c._screener && c._screener.cf_url) {
    cfBtn = `<a href="${esc(c._screener.cf_url)}" target="_blank" class="btn-rm">CF RM ↗</a>`;
  }

  // Email collapse button
  const emailBtn = c.email_draft ? `<button class="btn-rm btn-rm-sec" onclick="document.getElementById('email-section').scrollIntoView({behavior:'smooth'})">이메일 초안 ↓</button>` : '';

  return `
<div class="co-header">
  <div class="co-header-top">
    <div class="co-header-left">
      <div class="co-name">${esc(c.name)}</div>
      ${m.business ? `<div class="co-desc">${esc(m.business)}</div>` : ''}
      ${pills ? `<div class="co-meta">${pills}</div>` : ''}
    </div>
    <div class="co-header-right">
      ${cfBtn}
      ${emailBtn}
    </div>
  </div>
  ${stageHtml}
</div>`;
}

/* ─── B. Verdict ────────────────────────────────────────────────── */
function renderVerdict(c) {
  const vl = (c.overall_verdict || '').toUpperCase();
  const stripCls = verdictStripClass(vl);
  const dotCls   = `vd-${vl.toLowerCase()}`;
  const lblCls   = `vl-${vl.toLowerCase()}`;
  const summary  = c.verdict_summary || '';

  // Split summary on semicolons for multi-line
  const parts = summary.split(';').map(p => p.trim()).filter(Boolean);
  const mainLine = parts[0] || '';
  const details  = parts.slice(1).join(' ');

  return `
<div class="verdict-strip ${stripCls}">
  <span class="verdict-dot ${dotCls}"></span>
  <div>
    <div class="verdict-label ${lblCls}">${vl}</div>
    <div class="verdict-summary">${esc(mainLine)}</div>
    ${details ? `<div class="verdict-detail">${esc(details)}</div>` : ''}
  </div>
</div>`;
}

/* ─── E. Financials ─────────────────────────────────────────────── */
function renderFinancials(c) {
  const fin = c.financials || {};

  // Determine which tabs to show
  const tabs = [];
  if (fin.bs_summary)          tabs.push({ id:'pane-bs',       label:'BS 요약' });
  if (fin.cash_balance)        tabs.push({ id:'pane-cash',     label:'현금 잔고' });
  if (fin.cash_flow_dw)        tabs.push({ id:'pane-dw',       label:'DW 현금흐름' });
  if (fin.cash_flow_submitted) tabs.push({ id:'pane-cf',       label:'입출금 상세' });
  if (fin.headcount)           tabs.push({ id:'pane-hc',       label:'인원 추이' });

  if (!tabs.length) return '';

  let html = `<div class="dash-section">
    <div class="section-label">Financials</div>
    <div class="section-title">재무 데이터</div>
  </div>
  <div class="fin-tabs">`;

  tabs.forEach((t, i) => {
    html += `<div class="fin-tab${i===0?' active':''}" data-pane="${t.id}">${esc(t.label)}</div>`;
  });
  html += `</div>`;

  // Panes
  html += `<div style="padding:0 24px;">`;

  // BS
  if (fin.bs_summary) {
    html += `<div class="fin-pane${tabs[0].id==='pane-bs'?' active':''}" id="pane-bs">`;
    html += renderBSTable(fin.bs_summary);
    html += `</div>`;
  }

  // Cash balance
  if (fin.cash_balance) {
    html += `<div class="fin-pane" id="pane-cash">`;
    html += renderCashBalance(fin.cash_balance);
    html += `</div>`;
  }

  // DW CF
  if (fin.cash_flow_dw) {
    html += `<div class="fin-pane" id="pane-dw">`;
    html += renderDWCF(fin.cash_flow_dw);
    html += `</div>`;
  }

  // CF Submitted
  if (fin.cash_flow_submitted) {
    html += `<div class="fin-pane" id="pane-cf">`;
    html += renderCFSubmitted(fin.cash_flow_submitted);
    html += `</div>`;
  }

  // Headcount
  if (fin.headcount) {
    html += `<div class="fin-pane" id="pane-hc">`;
    html += renderHeadcount(fin.headcount);
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function renderBSTable(bs) {
  if (!bs || !bs.rows) return '<div class="no-data">데이터 없음</div>';
  let html = `<table class="fin-table"><thead><tr>`;
  (bs.headers || []).forEach(h => { html += `<th>${esc(h)}</th>`; });
  html += `</tr></thead><tbody>`;

  // Group separators
  const groups = {
    '매출':0, '영업이익':0, '순이익':0,
    '총자산':1, '현금':1, '자본':1, '부채':1,
    '단기차입':2, '이자비용':2, '누적적자':2,
    '인건비':3, '임차료':3, '수수료':3
  };
  let lastGroup = null;

  bs.rows.forEach(row => {
    const item = row[0] || '';
    const grp  = groups[item];
    const isGroupStart = grp !== undefined && grp !== lastGroup;
    if (grp !== undefined) lastGroup = grp;

    const rowCls = isGroupStart ? 'row-group' : '';
    html += `<tr class="${rowCls}">`;
    row.forEach((cell, ci) => {
      if (ci === 0) {
        html += `<td>${esc(cell)}</td>`;
      } else if (ci === row.length - 1) {
        // trend column
        html += `<td class="trend">${esc(cell)}</td>`;
      } else {
        const neg = String(cell).trim().startsWith('-');
        html += `<td class="${neg ? 'num-neg' : ''}">${esc(cell)}</td>`;
      }
    });
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

function renderCashBalance(cb) {
  if (!cb || !cb.rows) return '<div class="no-data">데이터 없음</div>';

  // Find max balance
  const vals = cb.rows.map(r => parseFloat(r[1]) || 0);
  const maxVal = Math.max(...vals, 0.01);
  const lastRow = cb.rows[cb.rows.length - 1] || [];
  const curVal  = parseFloat(lastRow[1]) || 0;
  const peakVal = Math.max(...vals);
  const peakPct = peakVal > 0 ? ((curVal - peakVal) / peakVal * 100).toFixed(1) : '—';

  // Runway calc: rough estimate
  let html = `
  <div class="cash-kpi-card">
    <div class="cash-kpi-item">
      <div class="cash-kpi-label">현재 잔고</div>
      <div class="cash-kpi-value${curVal < 1 ? ' kv-red' : ''}">${curVal.toFixed(2)}억</div>
      <div class="cash-kpi-sub">${curVal < 1 ? 'CRITICAL' : curVal < 5 ? 'WARNING' : 'NORMAL'}</div>
    </div>
    <div class="cash-kpi-item">
      <div class="cash-kpi-label">피크 대비</div>
      <div class="cash-kpi-value${parseFloat(peakPct)<-50?' kv-red':''}">${peakPct}%</div>
      <div class="cash-kpi-sub">피크 ${peakVal.toFixed(1)}억 → 현재 ${curVal.toFixed(2)}억</div>
    </div>
  </div>`;

  // Bar chart
  html += `<div class="bar-chart-wrap"><div class="bar-chart">`;
  cb.rows.forEach(row => {
    const v   = parseFloat(row[1]) || 0;
    const ht  = Math.max(4, Math.round(v / maxVal * 80));
    const cls = v < 1 ? 'bc-critical' : v < 5 ? 'bc-warning' : 'bc-normal';
    html += `<div class="bar-col">
      <span class="bar-val">${v < 1 ? v.toFixed(2) : v.toFixed(1)}</span>
      <div class="bar-bar ${cls}" style="height:${ht}px;" title="${esc(row[0])}: ${v}억"></div>
      <span class="bar-label">${esc((row[0]||'').replace(/^\d{4}-/,''))}</span>
    </div>`;
  });
  html += `</div></div>`;

  // Table
  html += `<table class="fin-table"><thead><tr>`;
  (cb.headers || []).forEach(h => { html += `<th>${esc(h)}</th>`; });
  html += `</tr></thead><tbody>`;
  cb.rows.forEach((row, i) => {
    const isLast = i === cb.rows.length - 1;
    const momCls = String(row[2]||'').trim().startsWith('-') ? 'num-neg' : String(row[2]||'').trim().startsWith('+') ? 'num-pos' : '';
    html += `<tr${isLast ? ' class="row-current"' : ''}>
      <td>${esc(row[0])}</td>
      <td>${esc(row[1])}</td>
      <td class="${momCls}">${esc(row[2])}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  return html;
}

function renderDWCF(dw) {
  if (!dw || !dw.rows) return '<div class="no-data">데이터 없음</div>';

  let html = `<table class="fin-table"><thead><tr>`;
  (dw.headers || []).forEach(h => { html += `<th>${esc(h)}</th>`; });
  html += `</tr></thead><tbody>`;

  dw.rows.forEach(row => {
    const ocf   = parseFloat(row[3]) || 0;
    const sal   = parseFloat(row[4]) || 0;
    const salAlert = sal > 0 && sal < 0.1;
    html += `<tr>`;
    row.forEach((cell, ci) => {
      if (ci === 0) {
        html += `<td>${esc(cell)}</td>`;
      } else if (ci === 3) { // OCF
        const cls = ocf < 0 ? 'cell-ocf-neg' : 'cell-ocf-pos';
        html += `<td class="${cls} ${ocf < 0 ? 'num-neg' : 'num-pos'}">${esc(cell)}</td>`;
      } else if (ci === 4) { // salary
        html += `<td${salAlert ? ' class="num-alert"' : (String(cell).trim().startsWith('-') ? ' class="num-neg"' : '')}>${esc(cell)}</td>`;
      } else if (ci === 5 || ci === 6) { // 재무입금 / 보조금
        const hasVal = parseFloat(cell) > 0;
        html += `<td${hasVal && ci===6 ? ' class="cell-subsidy"' : (String(cell).trim().startsWith('-') ? ' class="num-neg"' : '')}>${esc(cell)}</td>`;
      } else if (ci === 8) { // 비고
        html += `<td style="font-family:var(--mono);font-size:9px;color:var(--text-dim);text-align:left;">${esc(cell)}</td>`;
      } else {
        const neg = String(cell).trim().startsWith('-');
        html += `<td class="${neg ? 'num-neg' : ''}">${esc(cell)}</td>`;
      }
    });
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

function renderCFSubmitted(cf) {
  let html = '';

  if (cf.income) {
    html += `<div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--text-dim);letter-spacing:0.14em;margin-bottom:8px;">입금 상세</div>`;
    html += `<table class="fin-table" style="margin-bottom:20px;"><thead><tr>`;

    html += `</tr></thead><tbody>`;
    (cf.income.rows || []).forEach(row => {
      const item = row[0] || '';
      const isGov    = item.includes('정부지원금') || item.includes('보조금');
      const isRevenue= item === '매출 소계';
      const rowCls   = isGov ? 'row-gov' : isRevenue ? 'row-alert' : '';
      html += `<tr class="${rowCls}">`;
      row.forEach((cell, ci) => {
        if (ci === 0) {
          html += `<td>${esc(cell)}</td>`;
        } else if (ci === row.length - 1) {
          html += `<td style="font-family:var(--mono);font-size:9px;color:var(--text-dim);text-align:left;">${esc(cell)}</td>`;
        } else {
          html += `<td>${esc(cell)}</td>`;
        }
      });
      html += `</tr>`;
    });
    html += `</tbody></table>`;
  }

  if (cf.expense) {
    html += `<div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--text-dim);letter-spacing:0.14em;margin-bottom:8px;">출금 상세</div>`;
    html += `<table class="fin-table"><thead><tr>`;
    (cf.expense.headers || []).forEach(h => { html += `<th>${esc(h)}</th>`; });
    html += `</tr></thead><tbody>`;
    (cf.expense.rows || []).forEach(row => {
      const item = row[0] || '';
      const isLoan  = item.includes('대여금');
      const isLegal = item.includes('법무');
      const rowCls  = isLoan ? 'row-loan' : isLegal ? 'row-legal' : '';
      html += `<tr class="${rowCls}">`;
      row.forEach((cell, ci) => {
        if (ci === 0) {
          const suffix = isLoan ? ' <span style="font-size:8px;background:var(--bg-orange);color:var(--c-orange);padding:1px 4px;border-radius:2px;">확인필수</span>' : '';
          html += `<td>${esc(cell)}${suffix}</td>`;
        } else if (ci === row.length - 1) {
          html += `<td style="font-family:var(--mono);font-size:9px;color:var(--text-dim);text-align:left;">${esc(cell)}</td>`;
        } else {
          html += `<td>${esc(cell)}</td>`;
        }
      });
      html += `</tr>`;
    });
    html += `</tbody></table>`;
  }

  return html;
}

function renderHeadcount(hc) {
  if (!hc || !hc.rows) return '<div class="no-data">데이터 없음</div>';

  const counts = hc.rows.map(r => parseInt(r[1]) || 0);
  const peak   = Math.max(...counts);
  const last   = counts[counts.length - 1] || 0;
  const change = last - peak;
  const pct    = peak > 0 ? (change / peak * 100).toFixed(0) : 0;

  let html = `<div class="headcount-kpi">
    <div class="hc-kpi-item">
      <div class="hc-kpi-label">현재 인원</div>
      <div class="hc-kpi-value">${last}명</div>
    </div>
    <div class="hc-kpi-item">
      <div class="hc-kpi-label">피크</div>
      <div class="hc-kpi-value">${peak}명</div>
    </div>
    <div class="hc-kpi-item">
      <div class="hc-kpi-label">변화</div>
      <div class="hc-kpi-value" style="color:var(--c-red);">${change}명 (${pct}%)</div>
      <div class="hc-kpi-sub">피크 대비</div>
    </div>
  </div>`;

  html += `<table class="fin-table compact"><thead><tr>`;
  (hc.headers || []).forEach(h => { html += `<th>${esc(h)}</th>`; });
  html += `</tr></thead><tbody>`;

  hc.rows.forEach((row, i) => {
    const isLast  = i === hc.rows.length - 1;
    const quit    = parseInt(row[3]) || 0;
    const quitCls = quit >= 3 ? 'num-neg' : '';
    html += `<tr${isLast ? ' class="row-current"' : ''}>
      <td>${esc(row[0])}</td>
      <td>${esc(row[1])}</td>
      <td class="num-pos">${esc(row[2])}</td>
      <td class="${quitCls}">${esc(row[3])}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

  return html;

/* ─── F. Red Flags ──────────────────────────────────────────────── */
function renderRedFlags(c) {
  const flags = c.red_flags || [];
  if (!flags.length) return '';

  const groups = { CRITICAL: [], HIGH: [], MEDIUM: [] };
  flags.forEach(f => {
    const sev = (f.severity || '').toUpperCase();
    if (groups[sev]) groups[sev].push(f);
    else groups.MEDIUM.push(f);
  });

  let html = `<div class="dash-section">
    <div class="section-label">Red Flags</div>
    <div class="section-title">리스크 플래그</div>`;

  ['CRITICAL','HIGH','MEDIUM'].forEach(sev => {
    const list = groups[sev];
    if (!list.length) return;

    const sevLower = sev.toLowerCase();
    const dotColor = sev === 'CRITICAL' ? 'var(--c-red)' : sev === 'HIGH' ? 'var(--c-orange)' : 'var(--c-yellow)';
    const lblColor = sev === 'CRITICAL' ? 'var(--c-red)' : sev === 'HIGH' ? 'var(--c-orange)' : 'var(--c-yellow)';

    html += `<div class="flag-section">
      <div class="flag-section-head">
        <span class="flag-severity-dot" style="background:${dotColor};"></span>
        <span class="flag-severity-label" style="color:${lblColor};">${sev}</span>
        <span class="flag-count">${list.length}건</span>
      </div>`;

    list.forEach(f => {
      html += `<div class="flag-card fc-${sevLower}">
        <div class="flag-card-head">
          <span class="flag-badge fb-${sevLower}">${sev}</span>
          <span class="flag-no">FLAG ${f.id}</span>
          <span class="flag-title">${esc(f.title)}</span>
        </div>
        <div class="flag-body">${esc(f.detail)}</div>
      </div>`;
    });

    html += `</div>`;
  });

  html += `</div>`;
  return html;
}

/* ─── G. BEP ────────────────────────────────────────────────────── */
function renderBEP(c) {
  const bep = c.bep || {};
  let html = `<div class="dash-section">
    <div class="section-label">BEP Scenario</div>
    <div class="section-title">BEP 시나리오 분석</div>`;

  // Current state KPI cards
  if (bep.current_state && bep.current_state.length) {
    html += `<div class="bep-kpi-grid">`;
    bep.current_state.slice(0, 4).forEach(kpi => {
      const lbl = kpi.label || '';
      const val = kpi.value || '';
      const isCritical = lbl.includes('런웨이') || (val.includes('0.') && val.includes('개월'));
      const isWarn = lbl.includes('burn') || lbl.includes('출금');
      const topCls = isCritical ? 'bk-red' : isWarn ? 'bk-yellow' : '';
      const valCls = isCritical ? 'bv-red' : '';
      const badge  = isCritical ? 'bb-critical' : isWarn ? 'bb-warning' : 'bb-normal';
      const badgeTxt = isCritical ? 'CRITICAL' : isWarn ? 'WARNING' : '';
      html += `<div class="bep-kpi-card ${topCls}">
        <div class="bep-kpi-label">${esc(lbl)}</div>
        <div class="bep-kpi-val ${valCls}">${esc(val)}</div>
        ${badgeTxt ? `<span class="bep-kpi-badge ${badge}">${badgeTxt}</span>` : ''}
      </div>`;
    });
    html += `</div>`;

    // Extra items as compact list
    if (bep.current_state.length > 4) {
      html += `<div style="margin-bottom:16px;">`;
      bep.current_state.slice(4).forEach(kpi => {
        html += `<div style="display:flex;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
          <span style="color:var(--text-dim);min-width:140px;">${esc(kpi.label)}</span>
          <span style="color:var(--text-pri);">${esc(kpi.value)}</span>
        </div>`;
      });
      html += `</div>`;
    }
  }

  // Scenarios
  if (bep.scenarios && bep.scenarios.length) {
    html += `<div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--text-dim);letter-spacing:0.14em;margin-bottom:8px;">시나리오</div>`;
    html += `<table class="fin-table" style="margin-bottom:16px;"><thead><tr>
      <th style="text-align:left;">시나리오</th>
      <th style="text-align:left;">조건</th>
      <th style="text-align:left;">현실성</th>
    </tr></thead><tbody>`;
    bep.scenarios.forEach(s => {
      html += `<tr>
        <td style="font-weight:600;white-space:nowrap;">${esc(s.name)}</td>
        <td style="text-align:left;">${esc(s.condition)}</td>
        <td style="text-align:left;">${esc(s.feasibility)}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  // Runway with investment
  if (bep.runway_with_investment && bep.runway_with_investment.length) {
    html += `<div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--text-dim);letter-spacing:0.14em;margin-bottom:8px;">투입금액별 런웨이</div>`;
    html += `<table class="fin-table"><thead><tr>
      <th style="text-align:left;">투입금액</th>
      <th>현 Burn 기준</th>
      <th>시나리오 B 기준</th>
    </tr></thead><tbody>`;
    bep.runway_with_investment.forEach(r => {
      html += `<tr>
        <td style="font-weight:600;">${esc(r.amount)}</td>
        <td>${esc(r.current_burn)}</td>
        <td>${esc(r.scenario_b)}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    html += `<div class="bep-warn-box mt-12">선순위 부채 20억 존재 시, 피트스탑 후순위 투자는 실질 회수 가능성이 극히 낮음.</div>`;
  }

  html += `</div>`;
  return html;
}

/* ─── H. KHK Decision ──────────────────────────────────────────── */
function renderKHK(c) {
  const khk = c.khk_preview || {};
  const go   = khk.go   || [];
  const nogo = khk.nogo || [];
  const hold = khk.hold || [];

  let html = `<div class="dash-section">
    <div class="section-label">KHK Decision</div>
    <div class="section-title">판단 시나리오</div>
    <div class="khk-grid mt-12">`;

  // GO
  html += `<div class="khk-col khk-go">
    <div class="khk-col-head kh-go">GO 시나리오</div>
    <ul class="khk-list">`;
  if (go.length) {
    go.forEach((item, i) => { html += `<li data-no="${i+1}.">${esc(item)}</li>`; });
  } else {
    html += `<li style="color:var(--text-dim);font-style:italic;" data-no="">해당 없음</li>`;
  }
  html += `</ul></div>`;

  // NO-GO
  html += `<div class="khk-col khk-nogo">
    <div class="khk-col-head kh-nogo">NO-GO 시나리오</div>
    <ul class="khk-list">`;
  if (nogo.length) {
    nogo.forEach((item, i) => { html += `<li data-no="${i+1}.">${esc(item)}</li>`; });
  } else {
    // Pull NO-GO items from GO list that contain keywords
    const nogoFromGo = go.filter(item =>
      item.includes('절대') || item.includes('NO-GO') || item.includes('금융권') ||
      item.includes('보조금 프로젝트') || item.includes('숫자를 모르') || item.includes('어디로 빠')
    );
    if (nogoFromGo.length) {
      nogoFromGo.forEach((item, i) => { html += `<li data-no="${i+1}.">${esc(item)}</li>`; });
    } else {
      html += `<li style="color:var(--text-dim);font-style:italic;" data-no="">—</li>`;
    }
  }
  html += `</ul></div>`;

  // HOLD
  html += `<div class="khk-col khk-hold">
    <div class="khk-col-head kh-hold">보류 시나리오</div>
    <ul class="khk-list">`;
  if (hold.length) {
    hold.forEach((item, i) => { html += `<li data-no="${i+1}.">${esc(item)}</li>`; });
  } else {
    html += `<li style="color:var(--text-dim);font-style:italic;" data-no="">해당 없음</li>`;
  }
  html += `</ul></div>`;

  html += `</div></div>`;
  return html;
}

/* ─── I. Actions ────────────────────────────────────────────────── */
function renderActions(c) {
  const actions = c.actions || [];
  let html = `<div class="dash-section">
    <div class="section-label">Next Actions</div>
    <div class="section-title">다음 액션</div>
    <table class="fin-table mt-12"><thead><tr>
      <th style="text-align:center;">순위</th>
      <th style="text-align:left;">액션</th>
      <th style="text-align:left;">담당</th>
      <th>기한</th>
    </tr></thead><tbody>`;

  actions.forEach(a => {
    const ownerKey = (a.owner || '').toLowerCase();
    let ownerBadge = '';
    if (ownerKey.includes('kyi') && ownerKey.includes('khk')) {
      ownerBadge = `<span class="action-owner-badge ob-kyi">KYI</span> → <span class="action-owner-badge ob-khk">KHK</span>`;
    } else if (ownerKey.includes('khk')) {
      ownerBadge = `<span class="action-owner-badge ob-khk">KHK</span>`;
    } else {
      ownerBadge = `<span class="action-owner-badge ob-kyi">${esc(a.owner)}</span>`;
    }

    const isUrgent = (a.deadline || '').includes('즉시');
    const dlCls = isUrgent ? 'dl-urgent' : '';
    const isFst = a.priority === 1;

    html += `<tr${isFst ? ' style="font-weight:600;border-left:3px solid var(--text-pri);"' : ''}>
      <td style="text-align:center;font-family:var(--mono);">${a.priority}</td>
      <td style="text-align:left;">${esc(a.action)}</td>
      <td style="text-align:left;">${ownerBadge}</td>
      <td><span class="action-deadline ${dlCls}">${esc(a.deadline)}</span></td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  return html;
}

/* ─── J. Email Draft ────────────────────────────────────────────── */
function renderEmailDraft(c) {
  if (!c.email_draft) return '';
  return `<div class="dash-section" id="email-section">
    <div class="section-label">Email Draft</div>
    <div class="collapsible">
      <div class="collapsible-header">
        <span class="collapsible-title">이메일 초안 — 사전 확인 요청</span>
        <span class="collapsible-toggle">▶</span>
      </div>
      <div class="collapsible-body">
        <div class="email-content">
          <div class="email-actions">
            <button class="btn-copy" id="btn-copy-email">복사 ↗</button>
          </div>
          <div class="email-text">${esc(c.email_draft)}</div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════ */
function showError(msg, hint) {
  const main = document.getElementById('main');
  main.innerHTML = `<div class="error-state">
    <div class="error-title">데이터 로드 실패</div>
    <div class="error-msg">${esc(msg)}</div>
    ${hint ? `<div class="error-hint">${esc(hint)}</div>` : ''}
  </div>`;
}

async function init() {
  // Set topbar date
  document.getElementById('tb-date').textContent = today();

  try {
    const res = await fetch('./dashboard_data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    const data = await res.json();
    ALL_COMPANIES = data.companies || [];

    document.getElementById('loading-state').style.display = 'none';

    if (!ALL_COMPANIES.length) {
      showError('회사 데이터가 없습니다.', 'dashboard_data.json에 companies 배열을 확인하세요.');
      return;
    }

    buildSidebar(ALL_COMPANIES);

    // Select first active company
    const firstActive = ALL_COMPANIES.find(c => c.status !== 'closed');
    selectCompany((firstActive || ALL_COMPANIES[0]).id);

  } catch (err) {
    document.getElementById('loading-state').style.display = 'none';
    showError(
      err.message || '알 수 없는 오류',
      'python -m http.server로 서빙했는지 확인하세요. file:// 프로토콜로는 fetch()가 차단됩니다.'
    );
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
