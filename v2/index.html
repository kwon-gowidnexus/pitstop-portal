<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitstop Portal v2 — 6기준 스크리너</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
<style>
/* ─── Reset & Base ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #ffffff;
  --surface:    #f8f9fa;
  --surface2:   #f1f3f5;
  --border:     #e5e7eb;
  --border-mid: #d1d5db;
  --text-pri:   #111827;
  --text-sec:   #4b5563;
  --text-dim:   #9ca3af;
  --mono:       'Noto Sans Mono', monospace;
  --sans:       'Noto Sans KR', sans-serif;
  --r:          4px;

  /* grade colors */
  --c-green:    #16a34a;
  --bg-green:   #dcfce7;
  --c-yellow:   #ca8a04;
  --bg-yellow:  #fef9c3;
  --c-red:      #dc2626;
  --bg-red:     #fee2e2;
  --c-orange:   #ea580c;
  --bg-orange:  #ffedd5;
  --c-unknown:  #9ca3af;
  --bg-unknown: #f3f4f6;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text-pri);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar        { width: 5px; height: 5px; }
::-webkit-scrollbar-track  { background: var(--surface); }
::-webkit-scrollbar-thumb  { background: var(--border-mid); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* ─── Layout ────────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─── Topbar ────────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px;
  height: 46px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.tb-logo {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 500;
}

.tb-sep { color: var(--border-mid); }

.tb-page {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sec);
}

.tb-badge {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 2px 7px;
  border: 1px solid var(--border-mid);
  color: var(--text-dim);
  border-radius: 3px;
}

.tb-spacer { flex: 1; }

.tb-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
}

/* ─── Body ───────────────────────────────────────────────────────── */
.body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ─── Sidebar ────────────────────────────────────────────────────── */
.sidebar {
  width: 300px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-head {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sh-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.sh-count {
  font-size: 12px;
  color: var(--text-sec);
}

.sh-count strong {
  color: var(--text-pri);
  font-weight: 600;
}

.company-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}

.company-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  position: relative;
}

.company-item:last-child { border-bottom: none; }
.company-item:hover { background: var(--surface2); }
.company-item.active { background: #fff; }
.company-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--text-pri);
}

.ci-idx {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  width: 16px;
  text-align: right;
  flex-shrink: 0;
}

.ci-body { flex: 1; min-width: 0; }

.ci-name {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-pri);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 1px;
}

.ci-meta {
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}

.ci-ts {
  flex-shrink: 0;
  text-align: right;
  font-family: var(--mono);
  line-height: 1.5;
}

.ci-ts-date { font-size: 10px; color: var(--text-sec); }
.ci-ts-time { font-size: 9px; color: var(--text-dim); }

.badge-closed {
  display: inline-block;
  font-family: var(--mono);
  font-size: 7px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 2px;
  background: var(--surface2);
  color: var(--text-dim);
  border: 1px solid var(--border);
  font-weight: 600;
  flex-shrink: 0;
}

.ci-verdict {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: var(--mono);
  font-size: 7px;
  letter-spacing: 0.04em;
  padding: 1px 5px;
  border-radius: 2px;
  font-weight: 600;
  flex-shrink: 0;
}

.ci-verdict .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

.ci-verdict.v-go        { background: var(--bg-green);   color: var(--c-green); }
.ci-verdict.v-go .dot   { background: var(--c-green); }
.ci-verdict.v-yellow        { background: var(--bg-yellow);  color: var(--c-yellow); }
.ci-verdict.v-yellow .dot   { background: var(--c-yellow); }
.ci-verdict.v-conditional        { background: var(--bg-orange);  color: var(--c-orange); }
.ci-verdict.v-conditional .dot   { background: var(--c-orange); }
.ci-verdict.v-nogo        { background: var(--bg-red);     color: var(--c-red); }
.ci-verdict.v-nogo .dot   { background: var(--c-red); }

.ci-delete { font-size: 9px; color: var(--text-dim); opacity: 0.7; }

.company-item.is-closed .ci-name span:first-child { color: var(--text-dim); }
.company-item.is-closed .ci-meta,
.company-item.is-closed .ci-ts-date,
.company-item.is-closed .ci-ts-time,
.company-item.is-closed .ci-idx { opacity: 0.5; }

/* grade badge (sidebar) */
.grade-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.04em;
  padding: 2px 7px 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
  line-height: 1.4;
  font-weight: 500;
}

.grade-badge .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

.grade-badge.gb-green  { background: var(--bg-green);   color: var(--c-green);  }
.grade-badge.gb-green .dot  { background: var(--c-green);  }
.grade-badge.gb-yellow { background: var(--bg-yellow);  color: var(--c-yellow); }
.grade-badge.gb-yellow .dot { background: var(--c-yellow); }
.grade-badge.gb-red    { background: var(--bg-red);     color: var(--c-red);    }
.grade-badge.gb-red .dot    { background: var(--c-red);    }
.grade-badge.gb-orange { background: var(--bg-orange);  color: var(--c-orange); }
.grade-badge.gb-orange .dot { background: var(--c-orange); }
.grade-badge.gb-unknown { background: var(--bg-unknown); color: var(--c-unknown); }
.grade-badge.gb-unknown .dot { background: var(--c-unknown); }

/* ─── Main area ─────────────────────────────────────────────────── */
.main {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
}

.dashboard {
  padding: 0 0 48px;
}

/* ─── Empty / Loading / Error ────────────────────────────────────── */
.empty-state, .loading-state, .error-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 10px;
  color: var(--text-dim);
}

.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--text-dim);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { font-size: 12px; color: var(--text-dim); }

.error-title {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--c-red);
  letter-spacing: 0.1em;
}

.error-msg {
  font-size: 12px;
  color: var(--text-sec);
  max-width: 360px;
  text-align: center;
}

.error-hint {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: var(--r);
  max-width: 420px;
  word-break: break-all;
  text-align: left;
}

/* ─── Company Header ─────────────────────────────────────────────── */
.co-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 24px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.co-header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }

.co-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-pri);
}

.co-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.co-stat-pill {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-sec);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 3px 9px;
  border-radius: 3px;
}

.co-stat-pill strong { color: var(--text-pri); font-weight: 600; }
.co-stat-pill.interview-pill { color: var(--c-yellow); border-color: #fde68a; background: var(--bg-yellow); }

.btn-rm {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--text-pri);
  border: none;
  color: #fff;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 7px 14px;
  cursor: pointer;
  border-radius: var(--r);
  text-decoration: none;
  transition: opacity 0.1s;
  white-space: nowrap;
  flex-shrink: 0;
}

.btn-rm:hover { opacity: 0.8; }
.btn-rm-disabled { opacity: 0.3; pointer-events: none; background: var(--text-dim); }

/* ─── Section ────────────────────────────────────────────────────── */
.section {
  padding: 24px 24px 0;
}

.section + .section {
  margin-top: 0;
  padding-top: 32px;
}

.section-divider {
  height: 6px;
  background: var(--surface2);
  margin: 0;
}

.section-header {
  margin-bottom: 6px;
}

.section-header-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-pri);
  margin-bottom: 4px;
}

.section-intent {
  font-size: 12px;
  color: var(--text-sec);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

/* ─── Criteria Grid (Section 1) ─────────────────────────────────── */
.criteria-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.crit-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--border);
  border-radius: var(--r);
  padding: 14px 15px 13px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  word-break: keep-all;
  overflow-wrap: break-word;
}

.crit-card.grade-green  { border-top-color: var(--c-green);  }
.crit-card.grade-yellow { border-top-color: var(--c-yellow); }
.crit-card.grade-red    { border-top-color: var(--c-red);    }
.crit-card.grade-orange { border-top-color: var(--c-orange); }
.crit-card.grade-unknown { border-top-color: var(--border-mid); }

.interview-tag {
  position: absolute;
  top: 10px; right: 10px;
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  background: var(--bg-yellow);
  color: var(--c-yellow);
  border-radius: 3px;
  border: 1px solid #fde68a;
}

.crit-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-right: 52px;
}

.crit-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.crit-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-pri);
  flex: 1;
  min-width: 0;
}

/* criteria-level grade badge */
.crit-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.04em;
  padding: 2px 7px 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
  font-weight: 500;
}

.crit-badge .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.crit-badge.grade-green  { background: var(--bg-green);   color: var(--c-green);  }
.crit-badge.grade-green .dot  { background: var(--c-green); }
.crit-badge.grade-yellow { background: var(--bg-yellow);  color: var(--c-yellow); }
.crit-badge.grade-yellow .dot { background: var(--c-yellow); }
.crit-badge.grade-red    { background: var(--bg-red);     color: var(--c-red);    }
.crit-badge.grade-red .dot    { background: var(--c-red); }
.crit-badge.grade-orange { background: var(--bg-orange);  color: var(--c-orange); }
.crit-badge.grade-orange .dot { background: var(--c-orange); }
.crit-badge.grade-unknown { background: var(--bg-unknown); color: var(--c-unknown); }
.crit-badge.grade-unknown .dot { background: var(--c-unknown); }

.crit-summary {
  font-size: 12px;
  color: var(--text-sec);
  line-height: 1.5;
  padding-bottom: 7px;
  border-bottom: 1px solid var(--border);
  word-break: keep-all;
  overflow-wrap: break-word;
}

.crit-evidence {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.crit-evidence li {
  font-size: 11px;
  color: var(--text-sec);
  padding-left: 12px;
  position: relative;
  line-height: 1.45;
}

.crit-evidence li::before {
  content: '–';
  position: absolute;
  left: 0;
  color: var(--text-dim);
}

.crit-conf {
  margin-top: auto;
  padding-top: 6px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 5px;
}

.crit-conf.conf-interview { color: var(--c-yellow); }
.crit-conf::before { content: '◎'; font-size: 8px; }
.crit-conf.conf-interview::before { content: '◉'; }

/* Cash KPI bar */
.cash-kpi-bar {
  display: flex;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 14px;
}

.ckpi {
  flex: 1;
  background: var(--surface);
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.ckpi-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.ckpi-value {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-pri);
  font-family: var(--mono);
}

.ckpi-sub {
  font-size: 9px;
  color: var(--text-dim);
}

/* Section 1 bottom link */
.section-link-row {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-top: 4px;
  padding-bottom: 8px;
}

/* ─── Section 2: Expectations banner ─────────────────────────────── */
.s2-expectations {
  background: #fafbfc;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 12px;
}
.s2-expectations-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: var(--mono);
  margin-bottom: 8px;
}
.s2-expectations-body {
  font-size: 12px;
  color: var(--text-sec);
  line-height: 1.65;
  white-space: pre-line;
}

/* ─── Section 2: Next Step (보충요청 / 인터뷰가능) ────────────────── */
.s2-next {
  margin-top: 12px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 18px;
}
.s2-next-ready {
  background: var(--bg-green);
  border-color: var(--c-green);
}
.s2-next-request {
  background: #fff8f0;
  border-color: #e8a84c;
}
.s2-next-title {
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.s2-next-ready .s2-next-title { color: var(--c-green); }
.s2-next-request .s2-next-title { color: #b37a1a; }
.s2-next-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.s2-next-list li {
  font-size: 12px;
  color: var(--text-sec);
  padding-left: 20px;
  position: relative;
  line-height: 1.5;
}
.s2-next-list li::before {
  content: '☐';
  position: absolute;
  left: 0;
  color: #b37a1a;
  font-size: 13px;
}
/* ─── Section 2: Quick Check (대표/신청자) ────────────────────────── */
.s2-qcheck {
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 12px;
  font-size: 12px;
}
.s2-qcheck-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.s2-qcheck-label {
  color: var(--text-dim);
  font-size: 10px;
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.s2-qcheck-val {
  color: var(--text-main);
  font-weight: 600;
}
.s2-qcheck-match {
  margin-left: auto;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 3px;
}
.s2-qcheck-match.match-ok { background: var(--bg-green); color: var(--c-green); }
.s2-qcheck-match.match-diff { background: var(--bg-yellow); color: #b37a1a; }

.s2-next-ready-msg {
  font-size: 12px;
  color: var(--c-green);
  line-height: 1.5;
}

/* ─── Section 2: Cards ───────────────────────────────────────────── */
.s2-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 8px;
}

.s2-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 18px;
  min-width: 0;
}

.s2-card-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: var(--mono);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.s2-info-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.s2-info-list li {
  font-size: 12px;
  color: var(--text-sec);
  padding-left: 12px;
  position: relative;
  line-height: 1.5;
}

.s2-info-list li::before {
  content: '·';
  position: absolute;
  left: 2px;
  color: var(--text-dim);
}

/* Financial table */
.fin-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  font-family: var(--mono);
}

.fin-table thead th {
  text-align: right;
  padding: 4px 8px;
  color: var(--text-dim);
  font-weight: 500;
  border-bottom: 1px solid var(--border);
}

.fin-table thead th:first-child { text-align: left; }

.fin-table tbody td {
  text-align: right;
  padding: 5px 8px;
  color: var(--text-sec);
  border-bottom: 1px solid var(--border);
  word-break: keep-all;
  overflow-wrap: break-word;
}

.fin-table tbody td:first-child { text-align: left; color: var(--text-pri); font-weight: 500; }
.fin-table tbody tr:last-child td { border-bottom: none; }

.fin-table .val-pos { color: var(--c-green); }
.fin-table .val-neg { color: var(--c-red); }
.fin-table .val-highlight { color: var(--text-pri); font-weight: 600; }

/* Pipeline bar */
.pipeline-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.pipeline-item {
  display: flex;
  align-items: center;
  gap: 10px;
}

.pipeline-label {
  font-size: 11px;
  color: var(--text-sec);
  width: 80px;
  flex-shrink: 0;
}

.pipeline-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.pipeline-bar {
  height: 100%;
  border-radius: 3px;
  background: var(--c-green);
}

.pipeline-bar.bar-possible { background: var(--c-yellow); }
.pipeline-bar.bar-target   { background: var(--border-mid); }

.pipeline-val {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-pri);
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}

/* s2 change table */
.change-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}

.change-table th {
  text-align: left;
  padding: 4px 8px;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}

.change-table td {
  padding: 6px 8px;
  color: var(--text-sec);
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.5;
  word-break: keep-all;
  overflow-wrap: break-word;
}

.change-table tr:last-child td { border-bottom: none; }
.change-table td:first-child { color: var(--text-pri); font-weight: 500; width: 80px; }

.arrow-change {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
}

.arrow-change .arrow { color: var(--text-dim); }

/* ─── Section 3 ──────────────────────────────────────────────────── */

/* Final verdict banner */
.verdict-banner {
  border-radius: var(--r);
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  border: 1px solid var(--c-red);
  background: var(--bg-red);
}

.verdict-banner.vb-green  { border-color: var(--c-green);  background: var(--bg-green); }
.verdict-banner.vb-yellow { border-color: var(--c-yellow); background: var(--bg-yellow); }
.verdict-banner.vb-orange { border-color: var(--c-orange); background: var(--bg-orange); }

.vb-grade {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--c-red);
  flex-shrink: 0;
  line-height: 1;
}

.vb-green .vb-grade  { color: var(--c-green); }
.vb-yellow .vb-grade { color: var(--c-yellow); }
.vb-orange .vb-grade { color: var(--c-orange); }

.vb-body { flex: 1; }

.vb-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--c-red);
  margin-bottom: 4px;
  opacity: 0.8;
}

.vb-green .vb-label  { color: var(--c-green); }
.vb-yellow .vb-label { color: var(--c-yellow); }
.vb-orange .vb-label { color: var(--c-orange); }

.vb-reason {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-pri);
  line-height: 1.5;
}

/* Interview 2-column */
.interview-2col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}

.interview-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
}

.ib-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: var(--mono);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.quote-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.quote-list li {
  font-size: 12px;
  color: var(--text-sec);
  padding: 8px 10px;
  background: var(--bg);
  border-left: 3px solid var(--border-mid);
  border-radius: 0 3px 3px 0;
  line-height: 1.5;
}

.quote-list.fm-quotes li {
  border-left-color: var(--c-red);
  background: #fff5f5;
  color: var(--text-pri);
}

/* Rejection reasons */
.rejection-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}

.rejection-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  border-left: 3px solid var(--c-red);
}

.rej-num {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  color: var(--c-red);
  flex-shrink: 0;
  width: 20px;
  padding-top: 1px;
}

.rej-text {
  flex: 1;
}

.rej-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-pri);
  margin-bottom: 2px;
}

.rej-detail {
  font-size: 11px;
  color: var(--text-sec);
  font-family: var(--mono);
}

/* Reopen conditions */
.reopen-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  margin-bottom: 8px;
}

.reopen-title {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.reopen-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 10px;
}

.reopen-list li {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
  color: var(--text-sec);
}

.reopen-num {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  color: var(--text-dim);
  flex-shrink: 0;
  width: 18px;
}

.reopen-when {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  padding-top: 8px;
  border-top: 1px solid var(--border);
  letter-spacing: 0.04em;
}


/* Placeholder for no s2/s3 data */
.no-data-block {
  background: var(--surface);
  border: 1px dashed var(--border-mid);
  border-radius: var(--r);
  padding: 32px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
}

/* ─── Responsive ────────────────────────────────────────────────── */
@media (max-width: 1100px) {
  .criteria-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 900px) {
  .s2-grid { grid-template-columns: 1fr; }
  .s2-grid .s2-card[style*="grid-column"] { grid-column: auto; }
  .interview-2col { grid-template-columns: 1fr; }
}

@media (max-width: 700px) {
  .criteria-grid { grid-template-columns: 1fr; }
  .sidebar { width: 200px; }
  .section { padding: 18px 16px 0; }
  .co-header { padding: 14px 16px 12px; flex-wrap: wrap; }
}

@media (max-width: 520px) {
  .sidebar { width: 160px; }
  .co-header { flex-direction: column; align-items: flex-start; gap: 10px; }
}

@media (max-width: 480px) {
  .body { flex-direction: column; }
  .sidebar { width: 100%; max-height: 160px; border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>

<div id="app">

  <!-- Topbar -->
  <div class="topbar">
    <span class="tb-logo">GOWID NEXUS</span>
    <span class="tb-sep">/</span>
    <span class="tb-page">Pit-Stop</span>
    <span class="tb-badge">v2</span>
    <span class="tb-sep">/</span>
    <span class="tb-page" style="color:var(--text-dim);"></span>
    <div class="tb-spacer"></div>
    <span class="tb-sub" id="tb-status"></span>
    <span class="tb-sep">|</span>
    <span class="tb-sub" id="tb-date"></span>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="sh-label">진단 회사</div>
        <div class="sh-count" id="sh-count">로딩 중...</div>
      </div>
      <div class="company-list" id="company-list">
        <div class="loading-state" style="height:120px;">
          <div class="spinner"></div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main">
      <div class="loading-state" id="initial-loading">
        <div class="spinner"></div>
        <div class="loading-text">데이터 로딩 중...</div>
      </div>
    </main>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     SCRIPT
════════════════════════════════════════════════════════════════ -->
<script>
(function () {

  /* ── 상태 ──────────────────────────────────────────────────── */
  let SCREENER_DATA = null;
  let selectedFolder = null;

  const $ = id => document.getElementById(id);

  /* ── grade 매핑 ─────────────────────────────────────────────── */
  function gbClass(grade) {
    const map = { green:'gb-green', yellow:'gb-yellow', red:'gb-red', conditional:'gb-orange', orange:'gb-orange', unknown:'gb-unknown', pending:'gb-unknown' };
    return map[(grade||'').toLowerCase()] || 'gb-unknown';
  }

  function gbLabel(grade) {
    const map = { green:'GREEN', yellow:'YELLOW', red:'RED', conditional:'ORANGE', orange:'ORANGE', unknown:'?', pending:'?' };
    return map[(grade||'').toLowerCase()] || '?';
  }

  function critGradeClass(grade) {
    const g = (grade||'').toLowerCase();
    if (g==='green') return 'grade-green';
    if (g==='yellow') return 'grade-yellow';
    if (g==='red') return 'grade-red';
    if (g==='conditional'||g==='orange') return 'grade-orange';
    return 'grade-unknown';
  }

  function critGradeLabel(grade) {
    const map = { green:'Green', yellow:'Yellow', red:'Red', conditional:'Orange', orange:'Orange' };
    return map[(grade||'').toLowerCase()] || '?';
  }

  function gradeColor(grade) {
    const map = { green:'#16a34a', yellow:'#ca8a04', red:'#dc2626', conditional:'#ea580c', orange:'#ea580c', unknown:'#9ca3af', pending:'#9ca3af' };
    return map[(grade||'').toLowerCase()] || '#9ca3af';
  }

  function confLabel(conf) {
    const map = { high:'DW 기반 판정', medium:'DW+추정 판정', low:'데이터 부족', interview:'인터뷰 필수' };
    return map[conf] || conf || '';
  }

  function sectionBadge(grade, label) {
    const gc2 = gbClass(grade);
    const gl2 = gbLabel(grade);
    return `<span class="grade-badge ${gc2}" style="font-size:9px;padding:3px 9px 3px 7px;margin-left:auto;">
      <span class="dot" style="width:6px;height:6px;"></span>${label}: ${gl2}
    </span>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 날짜 ───────────────────────────────────────────────────── */
  (function setDate() {
    const now = new Date();
    const yy = now.getFullYear();
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const dd = String(now.getDate()).padStart(2,'0');
    $('tb-date').textContent = `${yy}.${mm}.${dd}`;
  })();

  /* ── 데이터 로드 ───────────────────────────────────────────── */
  async function loadScreenerData() {
    try {
      const res = await fetch('screener_data.json?v=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      SCREENER_DATA = await res.json();
      onDataLoaded();
    } catch (err) {
      showError(err);
    }
  }

  function showError(err) {
    $('initial-loading').style.display = 'none';
    $('company-list').innerHTML = `<div style="padding:14px;font-size:11px;color:var(--text-dim);">데이터 로드 실패</div>`;
    $('sh-count').textContent = '오류';
    $('main').innerHTML = `
      <div class="error-state">
        <div class="error-title">DATA LOAD FAILED</div>
        <div class="error-msg"><code>screener_data.json</code> 파일을 로드할 수 없습니다. 로컬 서버를 사용하세요 (python -m http.server).</div>
        <div class="error-hint">${esc(String(err))}</div>
      </div>`;
  }

  function onDataLoaded() {
    $('initial-loading').style.display = 'none';
    renderCompanyList();
    showEmptyState();

    const genAt = SCREENER_DATA.generated_at;
    const dataSource = SCREENER_DATA.data_source || '';
    const statusEl = $('tb-status');

    if (genAt) {
      const genDate = genAt.slice(0,10);
      const today = new Date().toISOString().slice(0,10);
      const isToday = genDate === today;

      // 날짜 차이 계산
      const genTime = new Date(genDate).getTime();
      const nowTime = new Date(today).getTime();
      const daysDiff = Math.floor((nowTime - genTime) / 86400000);

      if (isToday) {
        statusEl.innerHTML = '<span style="color:#2e7d32;">●</span> DW 최신화 완료';
      } else if (daysDiff <= 1) {
        statusEl.innerHTML = '<span style="color:#e65100;">◆</span> generated ' + genDate;
      } else {
        statusEl.innerHTML = '<span style="color:#d32f2f;">▲</span> ' + daysDiff + '일 전 갱신 (' + genDate + ')';
      }

      statusEl.title = dataSource + ' · generated ' + genAt.slice(0,16).replace('T',' ');
    }
  }

  /* ── 사이드바 ───────────────────────────────────────────────── */
  /* 섹션별 등급 맵 (사이드바 + 대시보드 공용) */
  const S2_GRADE_MAP = {
    '마진맥스':'green', '인테이크':'yellow', '웰로':'yellow', '온오프믹스':'yellow',
    '와이오엘오':'red', '모트에이아이':'red', '메뉴잇':'red'
  };
  const S3_GRADE_MAP = {
    '마진맥스':'pending', '인테이크':'pending', '웰로':'yellow', '온오프믹스':'conditional',
    '와이오엘오':'pending', '모트에이아이':'red', '메뉴잇':'pending'
  };
  function latestGrade(folderName) {
    const s3 = S3_GRADE_MAP[folderName];
    if (s3 && s3 !== 'pending') return s3;
    const s2 = S2_GRADE_MAP[folderName];
    if (s2) return s2;
    return 'unknown';
  }

  function parseTs(raw) {
    if (!raw) return { date: '-', time: '' };
    const m = raw.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\s*(오전|오후)\s*(\d{1,2}):(\d{2}):?(\d{2})?/);
    if (!m) return { date: raw, time: '' };
    const [,y,mo,d,ap,h,mi] = m;
    let hh = parseInt(h);
    if (ap === '오후' && hh < 12) hh += 12;
    if (ap === '오전' && hh === 12) hh = 0;
    return {
      date: `${y}.${mo.padStart(2,'0')}.${d.padStart(2,'0')}`,
      time: `${String(hh).padStart(2,'0')}:${mi}`
    };
  }

  function tsToSortKey(raw) {
    if (!raw) return 0;
    const m = raw.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\s*(오전|오후)\s*(\d{1,2}):(\d{2})/);
    if (!m) return 0;
    const [,y,mo,d,ap,h,mi] = m;
    let hh = parseInt(h);
    if (ap === '오후' && hh < 12) hh += 12;
    if (ap === '오전' && hh === 12) hh = 0;
    return new Date(+y, +mo-1, +d, hh, +mi).getTime();
  }

  function renderCompanyList() {
    const companies = (SCREENER_DATA.companies || []).slice().sort((a, b) =>
      tsToSortKey(a.survey_timestamp) - tsToSortKey(b.survey_timestamp)
    );
    const active = companies.filter(c => c.status !== 'closed');
    const closed = companies.filter(c => c.status === 'closed');
    $('sh-count').innerHTML = `<strong>${companies.length}</strong>개사 (진행 ${active.length} · 종료 ${closed.length})`;
    if (!companies.length) {
      $('company-list').innerHTML = `<div style="padding:14px;font-size:11px;color:var(--text-dim);">등록된 회사가 없습니다.</div>`;
      return;
    }
    const html = companies.map((co, i) => {
      const ts = parseTs(co.survey_timestamp);
      const isClosed = co.status === 'closed';
      const vClass = co.verdict_class || ({green:'go',yellow:'yellow',conditional:'conditional',red:'nogo'}[latestGrade(co.folder_name)]) || null;
      const verdictBadge = vClass
        ? `<span class="ci-verdict v-${vClass}"><span class="dot"></span></span>`
        : '';
      let metaParts = [];
      if (co.interview_date) {
        metaParts.push(`인터뷰 ${co.interview_date.replace(/-/g, '.')}`);
      }
      if (isClosed) {
        metaParts.push(`<span class="badge-closed">CLOSED</span>`);
      }
      const metaLine = metaParts.length ? metaParts.join(' · ') : '';
      // 신청일로부터 6개월 후 자료 폐기일
      const delDate = (function() {
        const sk = tsToSortKey(co.survey_timestamp);
        if (!sk) return '';
        const dt = new Date(sk);
        dt.setMonth(dt.getMonth() + 6);
        return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
      })();
      return `
        <div class="company-item${isClosed ? ' is-closed' : ''}" data-folder="${esc(co.folder_name)}" onclick="selectCompany('${esc(co.folder_name)}')">
          <span class="ci-idx">${String(i+1).padStart(2,'0')}</span>
          <div class="ci-body">
            <div class="ci-name"><span>${esc(co.company_name)}</span>${verdictBadge}</div>
            ${metaLine ? `<div class="ci-meta">${metaLine}</div>` : ''}
            <div class="ci-meta ci-delete">자료 폐기 ${delDate}</div>
          </div>
          <div class="ci-ts">
            <div class="ci-ts-date">${ts.date}</div>
            <div class="ci-ts-time">${ts.time}</div>
          </div>
        </div>`;
    }).join('');
    $('company-list').innerHTML = html;
  }

  function showEmptyState() {
    $('main').innerHTML = `
      <div class="empty-state">
        <div style="font-size:24px;color:var(--border-mid);">←</div>
        <div style="font-size:13px;color:var(--text-dim);">회사를 선택하세요</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:0.08em;">SELECT A COMPANY</div>
      </div>`;
  }

  /* ── 회사 선택 ─────────────────────────────────────────────── */
  window.selectCompany = function(folderName) {
    if (!SCREENER_DATA) return;
    selectedFolder = folderName;
    document.querySelectorAll('.company-item').forEach(el => {
      el.classList.toggle('active', el.dataset.folder === folderName);
    });
    const co = (SCREENER_DATA.companies||[]).find(c => c.folder_name === folderName);
    if (!co) return;
    window._currentCompany = co;
    renderDashboard(co);
  };

  /* ── 대시보드 렌더 ──────────────────────────────────────────── */
  function renderDashboard(co) {
    const gc = gbClass(co.overall_grade);
    const gl = gbLabel(co.overall_grade);
    const CRITERIA_ORDER = ['debt_control','bep_roadmap','worst_case','financial_3axis'];
    const CRITERIA_NUMS  = ['①','②','③','④'];
    const rawCriteria = co.criteria || {};
    const criteriaEntries = CRITERIA_ORDER.map((key,i) => ({
      ...(rawCriteria[key]||{}), _key:key, _num:CRITERIA_NUMS[i]
    })).filter(c => c.name);

    /* 섹션별 등급 계산 */
    const autoKeys = ['debt_control','bep_roadmap','worst_case','financial_3axis'];
    const s1Grades = autoKeys.map(k => (rawCriteria[k]||{}).grade||'unknown');
    const s1Red = s1Grades.filter(g=>g==='red').length;
    const s1Grade = s1Red >= 2 ? 'red' : s1Red === 1 ? 'conditional' : s1Grades.every(g=>g==='green') ? 'green' : 'yellow';
    const s2Grade = S2_GRADE_MAP[co.folder_name] || 'unknown';
    const s3Grade = S3_GRADE_MAP[co.folder_name] || 'unknown';

    const rmHref = co.cf_url || '';
    const rmBtn = rmHref
      ? `<a class="btn-rm" href="${esc(rmHref)}" target="_blank" rel="noopener">Capital Flow RM →</a>`
      : `<span class="btn-rm btn-rm-disabled">Capital Flow RM →</span>`;

    /* ── Section 1 HTML ─────────────────────────────────────── */
    const cardsHtml = criteriaEntries.map(cr => {
      const gcls  = critGradeClass(cr.grade);

  // 영문↔한글 이름 매핑 (대표자 본인이 영문명으로 신청한 경우)
  const NAME_MAP = {
    '천영록': 'Jayden', 'Jayden': '천영록',
    '양준철': 'JoonCheol Yang', 'JoonCheol Yang': '양준철',
    '황유미': 'Yoomee Hwang', 'Yoomee Hwang': '황유미',
    '채지훈': 'Been Bin', 'Been Bin': '채지훈',
  };
  function nameMatch(ceo, app) {
    if (!ceo || !app) return false;
    if (ceo === app) return true;
    if (app.includes(ceo) || ceo.includes(app)) return true;
    // 영한 매핑 체크
    const mapped = NAME_MAP[ceo];
    if (mapped && (mapped === app || app.includes(mapped) || mapped.includes(app))) return true;
    const mapped2 = NAME_MAP[app];
    if (mapped2 && (mapped2 === ceo || ceo.includes(mapped2) || mapped2.includes(ceo))) return true;
    return false;
  }

      <th style="padding:8px 12px; border:1px solid #e5e7eb; font-weight:600; width:30px;">#</th>
      <th style="padding:8px 12px; border:1px solid #e5e7eb; font-weight:600;">재신청 조건</th>
      <th style="padding:8px 12px; border:1px solid #e5e7eb; font-weight:600;">제출 서류</th>
    </tr>
    ${reopenRows}
  </table>
  ` : `
  ${strengthsHtml}
  <div style="font-size:16px; font-weight:700; margin:36px 0 16px; padding-bottom:8px; border-bottom:2px solid #e0e0e0;">3. 경영 개선 과제</div>
  <p style="margin-bottom:18px;">서류 심사에서 확인된 개선 필요 항목입니다. 각 과제별 데이터 근거와 제출 자료에서 확인된 관련 사항을 함께 정리하였습니다.</p>
  ${improvementHtml || '<div style="padding:14px 18px;background:#f7f8fa;border-radius:8px;font-size:11px;color:#555;">현재 서류 심사 기준으로 주요 개선 필요 항목이 없습니다. 인터뷰를 통해 추가 확인 후 안내드리겠습니다.</div>'}
  ${interviewNeedsHtml}
  <div style="font-size:16px; font-weight:700; margin:36px 0 16px; padding-bottom:8px; border-bottom:2px solid #e0e0e0;">4. 향후 절차</div>
  <p style="margin-bottom:14px;">상기 개선 과제에 대한 진행 상황을 확인한 후 대표 인터뷰를 진행하며, 인터뷰 결과에 따라 최종 참여 여부가 결정됩니다.</p>
  `}

  <div style="margin-top:48px; padding-top:14px; border-top:1px solid #e0e0e0; font-size:9px; color:#999; text-align:center;">
    GOWID NEXUS &middot; Pit-Stop 경영 개선 리포트 &middot; ${dateStr}<br>
    본 리포트는 피트스탑 심사 결과를 바탕으로 작성되었으며, 투자 권유 문서가 아닙니다.<br>
    문의: 고위드넥서스 피트스탑팀
  </div>

</div>`;
    }

    document.body.appendChild(container);
    const el = document.getElementById('pdf-report');

    const opt = {
      margin: 0,
      filename: fileName,
      image: { type:'jpeg', quality:0.98 },
      html2canvas: { scale:2, useCORS:true, letterRendering:true },
      jsPDF: { unit:'mm', format:'a4', orientation:'portrait' },
      pagebreak: { mode:['avoid-all','css','legacy'] }
    };

    html2pdf().set(opt).from(el).outputPdf('blob').then(blob => {
      /* 수동 다운로드 링크 — 브라우저가 blob UUID를 파일명으로 쓰는 문제 방지 */
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      document.body.removeChild(container);
      btn.textContent = origText;
      btn.disabled = false;
    }).catch(err => {
      console.error('PDF 생성 실패:', err);
      document.body.removeChild(container);
      btn.textContent = origText;
      btn.disabled = false;
      alert('PDF 생성에 실패했습니다.\n\n대안: Ctrl+P → "PDF로 저장"을 선택해주세요.');
    });
  };

  /* ── 초기 실행 ─────────────────────────────────────────────── */
  loadScreenerData();

})();
</script>
</body>
</html>
