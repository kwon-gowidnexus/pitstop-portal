<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitstop Portal v2 — 6기준 스크리너</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
<style>
/* ─── Reset & Base ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #ffffff;
  --surface:    #f8f9fa;
  --surface2:   #f1f3f5;
  --border:     #e5e7eb;
  --border-mid: #d1d5db;
  --text-pri:   #111827;
  --text-sec:   #4b5563;
  --text-dim:   #9ca3af;
  --mono:       'Noto Sans Mono', monospace;
  --sans:       'Noto Sans KR', sans-serif;
  --r:          4px;

  /* grade colors */
  --c-green:    #16a34a;
  --bg-green:   #dcfce7;
  --c-yellow:   #ca8a04;
  --bg-yellow:  #fef9c3;
  --c-red:      #dc2626;
  --bg-red:     #fee2e2;
  --c-orange:   #ea580c;
  --bg-orange:  #ffedd5;
  --c-unknown:  #9ca3af;
  --bg-unknown: #f3f4f6;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text-pri);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar        { width: 5px; height: 5px; }
::-webkit-scrollbar-track  { background: var(--surface); }
::-webkit-scrollbar-thumb  { background: var(--border-mid); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* ─── Layout ────────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─── Topbar ────────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px;
  height: 46px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.tb-logo {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 500;
}

.tb-sep { color: var(--border-mid); }

.tb-page {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sec);
}

.tb-badge {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 2px 7px;
  border: 1px solid var(--border-mid);
  color: var(--text-dim);
  border-radius: 3px;
}

.tb-spacer { flex: 1; }

.tb-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
}

/* ─── Body ───────────────────────────────────────────────────────── */
.body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ─── Sidebar ────────────────────────────────────────────────────── */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-head {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sh-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.sh-count {
  font-size: 12px;
  color: var(--text-sec);
}

.sh-count strong {
  color: var(--text-pri);
  font-weight: 600;
}

.company-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}

.company-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  position: relative;
}

.company-item:last-child { border-bottom: none; }
.company-item:hover { background: var(--surface2); }
.company-item.active { background: #fff; }
.company-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--text-pri);
}

.ci-idx {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  width: 16px;
  text-align: right;
  flex-shrink: 0;
}

.ci-body { flex: 1; min-width: 0; }

.ci-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-pri);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}

/* grade badge (sidebar) */
.grade-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.04em;
  padding: 2px 7px 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
  line-height: 1.4;
  font-weight: 500;
}

.grade-badge .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

.grade-badge.gb-green  { background: var(--bg-green);   color: var(--c-green);  }
.grade-badge.gb-green .dot  { background: var(--c-green);  }
.grade-badge.gb-yellow { background: var(--bg-yellow);  color: var(--c-yellow); }
.grade-badge.gb-yellow .dot { background: var(--c-yellow); }
.grade-badge.gb-red    { background: var(--bg-red);     color: var(--c-red);    }
.grade-badge.gb-red .dot    { background: var(--c-red);    }
.grade-badge.gb-orange { background: var(--bg-orange);  color: var(--c-orange); }
.grade-badge.gb-orange .dot { background: var(--c-orange); }
.grade-badge.gb-unknown { background: var(--bg-unknown); color: var(--c-unknown); }
.grade-badge.gb-unknown .dot { background: var(--c-unknown); }

/* ─── Main area ─────────────────────────────────────────────────── */
.main {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
}

.dashboard {
  padding: 0 0 48px;
}

/* ─── Empty / Loading / Error ────────────────────────────────────── */
.empty-state, .loading-state, .error-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 10px;
  color: var(--text-dim);
}

.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--text-dim);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { font-size: 12px; color: var(--text-dim); }

.error-title {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--c-red);
  letter-spacing: 0.1em;
}

.error-msg {
  font-size: 12px;
  color: var(--text-sec);
  max-width: 360px;
  text-align: center;
}

.error-hint {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: var(--r);
  max-width: 420px;
  word-break: break-all;
  text-align: left;
}

/* ─── Company Header ─────────────────────────────────────────────── */
.co-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 24px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.co-header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }

.co-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-pri);
}

.co-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.co-stat-pill {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-sec);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 3px 9px;
  border-radius: 3px;
}

.co-stat-pill strong { color: var(--text-pri); font-weight: 600; }
.co-stat-pill.interview-pill { color: var(--c-yellow); border-color: #fde68a; background: var(--bg-yellow); }

.btn-rm {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--text-pri);
  border: none;
  color: #fff;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 7px 14px;
  cursor: pointer;
  border-radius: var(--r);
  text-decoration: none;
  transition: opacity 0.1s;
  white-space: nowrap;
  flex-shrink: 0;
}

.btn-rm:hover { opacity: 0.8; }
.btn-rm-disabled { opacity: 0.3; pointer-events: none; background: var(--text-dim); }

/* ─── Section ────────────────────────────────────────────────────── */
.section {
  padding: 24px 24px 0;
}

.section + .section {
  margin-top: 0;
  padding-top: 32px;
}

.section-divider {
  height: 6px;
  background: var(--surface2);
  margin: 0;
}

.section-header {
  margin-bottom: 6px;
}

.section-header-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-pri);
  margin-bottom: 4px;
}

.section-intent {
  font-size: 12px;
  color: var(--text-sec);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

/* ─── Criteria Grid (Section 1) ─────────────────────────────────── */
.criteria-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.crit-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--border);
  border-radius: var(--r);
  padding: 14px 15px 13px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  word-break: keep-all;
  overflow-wrap: break-word;
}

.crit-card.grade-green  { border-top-color: var(--c-green);  }
.crit-card.grade-yellow { border-top-color: var(--c-yellow); }
.crit-card.grade-red    { border-top-color: var(--c-red);    }
.crit-card.grade-orange { border-top-color: var(--c-orange); }
.crit-card.grade-unknown { border-top-color: var(--border-mid); }

.interview-tag {
  position: absolute;
  top: 10px; right: 10px;
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  background: var(--bg-yellow);
  color: var(--c-yellow);
  border-radius: 3px;
  border: 1px solid #fde68a;
}

.crit-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-right: 52px;
}

.crit-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.crit-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-pri);
  flex: 1;
  min-width: 0;
}

/* criteria-level grade badge */
.crit-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.04em;
  padding: 2px 7px 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
  font-weight: 500;
}

.crit-badge .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.crit-badge.grade-green  { background: var(--bg-green);   color: var(--c-green);  }
.crit-badge.grade-green .dot  { background: var(--c-green); }
.crit-badge.grade-yellow { background: var(--bg-yellow);  color: var(--c-yellow); }
.crit-badge.grade-yellow .dot { background: var(--c-yellow); }
.crit-badge.grade-red    { background: var(--bg-red);     color: var(--c-red);    }
.crit-badge.grade-red .dot    { background: var(--c-red); }
.crit-badge.grade-orange { background: var(--bg-orange);  color: var(--c-orange); }
.crit-badge.grade-orange .dot { background: var(--c-orange); }
.crit-badge.grade-unknown { background: var(--bg-unknown); color: var(--c-unknown); }
.crit-badge.grade-unknown .dot { background: var(--c-unknown); }

.crit-summary {
  font-size: 12px;
  color: var(--text-sec);
  line-height: 1.5;
  padding-bottom: 7px;
  border-bottom: 1px solid var(--border);
  word-break: keep-all;
  overflow-wrap: break-word;
}

.crit-evidence {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.crit-evidence li {
  font-size: 11px;
  color: var(--text-sec);
  padding-left: 12px;
  position: relative;
  line-height: 1.45;
}

.crit-evidence li::before {
  content: '–';
  position: absolute;
  left: 0;
  color: var(--text-dim);
}

.crit-conf {
  margin-top: auto;
  padding-top: 6px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 5px;
}

.crit-conf.conf-interview { color: var(--c-yellow); }
.crit-conf::before { content: '◎'; font-size: 8px; }
.crit-conf.conf-interview::before { content: '◉'; }

/* Section 1 bottom link */
.section-link-row {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-top: 4px;
  padding-bottom: 8px;
}

/* ─── Section 2: Cards ───────────────────────────────────────────── */
.s2-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 8px;
}

.s2-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 18px;
  min-width: 0;
}

.s2-card-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: var(--mono);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.s2-info-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.s2-info-list li {
  font-size: 12px;
  color: var(--text-sec);
  padding-left: 12px;
  position: relative;
  line-height: 1.5;
}

.s2-info-list li::before {
  content: '·';
  position: absolute;
  left: 2px;
  color: var(--text-dim);
}

/* Financial table */
.fin-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  font-family: var(--mono);
}

.fin-table thead th {
  text-align: right;
  padding: 4px 8px;
  color: var(--text-dim);
  font-weight: 500;
  border-bottom: 1px solid var(--border);
}

.fin-table thead th:first-child { text-align: left; }

.fin-table tbody td {
  text-align: right;
  padding: 5px 8px;
  color: var(--text-sec);
  border-bottom: 1px solid var(--border);
  word-break: keep-all;
  overflow-wrap: break-word;
}

.fin-table tbody td:first-child { text-align: left; color: var(--text-pri); font-weight: 500; }
.fin-table tbody tr:last-child td { border-bottom: none; }

.fin-table .val-pos { color: var(--c-green); }
.fin-table .val-neg { color: var(--c-red); }
.fin-table .val-highlight { color: var(--text-pri); font-weight: 600; }

/* Pipeline bar */
.pipeline-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.pipeline-item {
  display: flex;
  align-items: center;
  gap: 10px;
}

.pipeline-label {
  font-size: 11px;
  color: var(--text-sec);
  width: 80px;
  flex-shrink: 0;
}

.pipeline-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.pipeline-bar {
  height: 100%;
  border-radius: 3px;
  background: var(--c-green);
}

.pipeline-bar.bar-possible { background: var(--c-yellow); }
.pipeline-bar.bar-target   { background: var(--border-mid); }

.pipeline-val {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-pri);
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}

/* s2 change table */
.change-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}

.change-table th {
  text-align: left;
  padding: 4px 8px;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}

.change-table td {
  padding: 6px 8px;
  color: var(--text-sec);
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.5;
  word-break: keep-all;
  overflow-wrap: break-word;
}

.change-table tr:last-child td { border-bottom: none; }
.change-table td:first-child { color: var(--text-pri); font-weight: 500; width: 80px; }

.arrow-change {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
}

.arrow-change .arrow { color: var(--text-dim); }

/* ─── Section 3 ──────────────────────────────────────────────────── */

/* Final verdict banner */
.verdict-banner {
  border-radius: var(--r);
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  border: 1px solid var(--c-red);
  background: var(--bg-red);
}

.verdict-banner.vb-green  { border-color: var(--c-green);  background: var(--bg-green); }
.verdict-banner.vb-yellow { border-color: var(--c-yellow); background: var(--bg-yellow); }
.verdict-banner.vb-orange { border-color: var(--c-orange); background: var(--bg-orange); }

.vb-grade {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--c-red);
  flex-shrink: 0;
  line-height: 1;
}

.vb-green .vb-grade  { color: var(--c-green); }
.vb-yellow .vb-grade { color: var(--c-yellow); }
.vb-orange .vb-grade { color: var(--c-orange); }

.vb-body { flex: 1; }

.vb-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--c-red);
  margin-bottom: 4px;
  opacity: 0.8;
}

.vb-green .vb-label  { color: var(--c-green); }
.vb-yellow .vb-label { color: var(--c-yellow); }
.vb-orange .vb-label { color: var(--c-orange); }

.vb-reason {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-pri);
  line-height: 1.5;
}

/* Interview 2-column */
.interview-2col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}

.interview-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
}

.ib-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: var(--mono);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.quote-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.quote-list li {
  font-size: 12px;
  color: var(--text-sec);
  padding: 8px 10px;
  background: var(--bg);
  border-left: 3px solid var(--border-mid);
  border-radius: 0 3px 3px 0;
  line-height: 1.5;
}

.quote-list.fm-quotes li {
  border-left-color: var(--c-red);
  background: #fff5f5;
  color: var(--text-pri);
}

/* Rejection reasons */
.rejection-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}

.rejection-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  border-left: 3px solid var(--c-red);
}

.rej-num {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  color: var(--c-red);
  flex-shrink: 0;
  width: 20px;
  padding-top: 1px;
}

.rej-text {
  flex: 1;
}

.rej-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-pri);
  margin-bottom: 2px;
}

.rej-detail {
  font-size: 11px;
  color: var(--text-sec);
  font-family: var(--mono);
}

/* Reopen conditions */
.reopen-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  margin-bottom: 8px;
}

.reopen-title {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.reopen-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 10px;
}

.reopen-list li {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
  color: var(--text-sec);
}

.reopen-num {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  color: var(--text-dim);
  flex-shrink: 0;
  width: 18px;
}

.reopen-when {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  padding-top: 8px;
  border-top: 1px solid var(--border);
  letter-spacing: 0.04em;
}


/* Placeholder for no s2/s3 data */
.no-data-block {
  background: var(--surface);
  border: 1px dashed var(--border-mid);
  border-radius: var(--r);
  padding: 32px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
}

/* ─── Responsive ────────────────────────────────────────────────── */
@media (max-width: 1100px) {
  .criteria-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 900px) {
  .s2-grid { grid-template-columns: 1fr; }
  .s2-grid .s2-card[style*="grid-column"] { grid-column: auto; }
  .interview-2col { grid-template-columns: 1fr; }
}

@media (max-width: 700px) {
  .criteria-grid { grid-template-columns: 1fr; }
  .sidebar { width: 200px; }
  .section { padding: 18px 16px 0; }
  .co-header { padding: 14px 16px 12px; flex-wrap: wrap; }
}

@media (max-width: 520px) {
  .sidebar { width: 160px; }
  .co-header { flex-direction: column; align-items: flex-start; gap: 10px; }
}

@media (max-width: 480px) {
  .body { flex-direction: column; }
  .sidebar { width: 100%; max-height: 160px; border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>

<div id="app">

  <!-- Topbar -->
  <div class="topbar">
    <span class="tb-logo">GOWID NEXUS</span>
    <span class="tb-sep">/</span>
    <span class="tb-page">Pit-Stop</span>
    <span class="tb-badge">v2</span>
    <span class="tb-sep">/</span>
    <span class="tb-page" style="color:var(--text-dim);"></span>
    <div class="tb-spacer"></div>
    <span class="tb-sub" id="tb-date"></span>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="sh-label">진단 회사</div>
        <div class="sh-count" id="sh-count">로딩 중...</div>
      </div>
      <div class="company-list" id="company-list">
        <div class="loading-state" style="height:120px;">
          <div class="spinner"></div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main">
      <div class="loading-state" id="initial-loading">
        <div class="spinner"></div>
        <div class="loading-text">데이터 로딩 중...</div>
      </div>
    </main>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     SCRIPT
════════════════════════════════════════════════════════════════ -->
<script>
(function () {

  /* ── 상태 ──────────────────────────────────────────────────── */
  let SCREENER_DATA = null;
  let selectedFolder = null;

  const $ = id => document.getElementById(id);

  /* ── grade 매핑 ─────────────────────────────────────────────── */
  function gbClass(grade) {
    const map = { green:'gb-green', yellow:'gb-yellow', red:'gb-red', conditional:'gb-orange', orange:'gb-orange', unknown:'gb-unknown', pending:'gb-unknown' };
    return map[(grade||'').toLowerCase()] || 'gb-unknown';
  }

  function gbLabel(grade) {
    const map = { green:'GREEN', yellow:'YELLOW', red:'RED', conditional:'ORANGE', orange:'ORANGE', unknown:'?', pending:'?' };
    return map[(grade||'').toLowerCase()] || '?';
  }

  function critGradeClass(grade) {
    const g = (grade||'').toLowerCase();
    if (g==='green') return 'grade-green';
    if (g==='yellow') return 'grade-yellow';
    if (g==='red') return 'grade-red';
    if (g==='conditional'||g==='orange') return 'grade-orange';
    return 'grade-unknown';
  }

  function critGradeLabel(grade) {
    const map = { green:'Green', yellow:'Yellow', red:'Red', conditional:'Orange', orange:'Orange' };
    return map[(grade||'').toLowerCase()] || '?';
  }

  function gradeColor(grade) {
    const map = { green:'#16a34a', yellow:'#ca8a04', red:'#dc2626', conditional:'#ea580c', orange:'#ea580c', unknown:'#9ca3af', pending:'#9ca3af' };
    return map[(grade||'').toLowerCase()] || '#9ca3af';
  }

  function confLabel(conf) {
    const map = { high:'DW 기반 판정', medium:'DW+추정 판정', low:'데이터 부족', interview:'인터뷰 필수' };
    return map[conf] || conf || '';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 날짜 ───────────────────────────────────────────────────── */
  (function setDate() {
    const now = new Date();
    const yy = now.getFullYear();
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const dd = String(now.getDate()).padStart(2,'0');
    $('tb-date').textContent = `${yy}.${mm}.${dd}`;
  })();

  /* ── 데이터 로드 ───────────────────────────────────────────── */
  async function loadScreenerData() {
    try {
      const res = await fetch('screener_data.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      SCREENER_DATA = await res.json();
      onDataLoaded();
    } catch (err) {
      showError(err);
    }
  }

  function showError(err) {
    $('initial-loading').style.display = 'none';
    $('company-list').innerHTML = `<div style="padding:14px;font-size:11px;color:var(--text-dim);">데이터 로드 실패</div>`;
    $('sh-count').textContent = '오류';
    $('main').innerHTML = `
      <div class="error-state">
        <div class="error-title">DATA LOAD FAILED</div>
        <div class="error-msg"><code>screener_data.json</code> 파일을 로드할 수 없습니다. 로컬 서버를 사용하세요 (python -m http.server).</div>
        <div class="error-hint">${esc(String(err))}</div>
      </div>`;
  }

  function onDataLoaded() {
    $('initial-loading').style.display = 'none';
    renderCompanyList();
    showEmptyState();
    const genAt = SCREENER_DATA.generated_at;
    if (genAt) {
      const dateEl = $('tb-date');
      dateEl.textContent += '  ·  generated ' + genAt.slice(0,10);
    }
  }

  /* ── 사이드바 ───────────────────────────────────────────────── */
  function renderCompanyList() {
    const companies = SCREENER_DATA.companies || [];
    $('sh-count').innerHTML = `<strong>${companies.length}</strong>개사 등록`;
    if (!companies.length) {
      $('company-list').innerHTML = `<div style="padding:14px;font-size:11px;color:var(--text-dim);">등록된 회사가 없습니다.</div>`;
      return;
    }
    const html = companies.map((co, i) => {
      const isClosed = (co.status||'').toLowerCase() === 'closed';
      const gc = gbClass(co.overall_grade);
      const gl = gbLabel(co.overall_grade);
      const closedBadge = isClosed ? `<span style="font-size:8px;color:#999;background:#333;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;">CLOSED</span>` : '';
      const dimStyle = isClosed ? 'opacity:0.5;' : '';
      const nameClean = esc(co.company_name).replace(/^(주식회사\s*|㈜|\(주\))/, '').replace(/\s*주식회사$/, '');
      return `
        <div class="company-item" data-folder="${esc(co.folder_name)}" onclick="selectCompany('${esc(co.folder_name)}')" style="${dimStyle}">
          <span class="ci-idx">${String(i+1).padStart(2,'0')}</span>
          <div class="ci-body">
            <div class="ci-name">${nameClean}${closedBadge}</div>
          </div>
          <span class="grade-badge ${gc}"><span class="dot"></span>${gl}</span>
        </div>`;
    }).join('');
    $('company-list').innerHTML = html;
  }

  function showEmptyState() {
    $('main').innerHTML = `
      <div class="empty-state">
        <div style="font-size:24px;color:var(--border-mid);">←</div>
        <div style="font-size:13px;color:var(--text-dim);">회사를 선택하세요</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:0.08em;">회사를 선택하세요</div>
      </div>`;
  }

  /* ── 회사 선택 ─────────────────────────────────────────────── */
  window.selectCompany = function(folderName) {
    if (!SCREENER_DATA) return;
    selectedFolder = folderName;
    document.querySelectorAll('.company-item').forEach(el => {
      el.classList.toggle('active', el.dataset.folder === folderName);
    });
    const co = (SCREENER_DATA.companies||[]).find(c => c.folder_name === folderName);
    if (!co) return;
    renderDashboard(co);
  };

  /* ── 대시보드 렌더 ──────────────────────────────────────────── */
  function renderDashboard(co) {
    const gc = gbClass(co.overall_grade);
    const gl = gbLabel(co.overall_grade);
    const CRITERIA_ORDER = ['ceo_awareness','business_moat','debt_control','bep_roadmap','worst_case','financial_3axis'];
    const CRITERIA_NUMS  = ['①','②','③','④','⑤','⑥'];
    const rawCriteria = co.criteria || {};
    const criteriaEntries = CRITERIA_ORDER.map((key,i) => ({
      ...(rawCriteria[key]||{}), _key:key, _num:CRITERIA_NUMS[i]
    })).filter(c => c.name);

    /* 섹션별 등급 계산 */
    const autoKeys = ['debt_control','bep_roadmap','worst_case','financial_3axis'];
    const s1Grades = autoKeys.map(k => (rawCriteria[k]||{}).grade||'unknown');
    const s1Red = s1Grades.filter(g=>g==='red').length;
    const s1Grade = s1Red >= 2 ? 'red' : s1Red === 1 ? 'conditional' : s1Grades.every(g=>g==='green') ? 'green' : 'yellow';
    const s2GradeMap = {
      '마진맥스':'green', '인테이크':'yellow', '웰로':'yellow', '온오프믹스':'yellow',
      '와이오엘오':'red', '모트에이아이':'red', '메뉴잇':'conditional', '젠테':'red'
    };
    const s3GradeMap = {
      '마진맥스':'pending', '인테이크':'pending', '웰로':'yellow', '온오프믹스':'conditional',
      '와이오엘오':'pending', '모트에이아이':'red', '메뉴잇':'pending', '젠테':'red'
    };
    const s2Grade = s2GradeMap[co.folder_name] || 'unknown';
    const s3Grade = s3GradeMap[co.folder_name] || 'unknown';

    function sectionBadge(grade, label) {
      const gc2 = gbClass(grade);
      const gl2 = gbLabel(grade);
      return `<span class="grade-badge ${gc2}" style="font-size:9px;padding:3px 9px 3px 7px;margin-left:auto;">
        <span class="dot" style="width:6px;height:6px;"></span>${label}: ${gl2}
      </span>`;
    }

    const rmHref = co.cf_url || '';
    const rmBtn = rmHref
      ? `<a class="btn-rm" href="${esc(rmHref)}" target="_blank" rel="noopener">Capital Flow RM →</a>`
      : `<span class="btn-rm btn-rm-disabled">Capital Flow RM →</span>`;

    /* ── Section 1 HTML ─────────────────────────────────────── */
    const cardsHtml = criteriaEntries.map(cr => {
      const gcls  = critGradeClass(cr.grade);
      const glbl  = critGradeLabel(cr.grade);
      const evHtml = (cr.evidence||[]).map(e=>`<li>${esc(e)}</li>`).join('');
      const itTag  = cr.interview_required ? `<span class="interview-tag">인터뷰</span>` : '';
      const confCls = cr.confidence==='interview' ? 'conf-interview' : '';
      return `
        <div class="crit-card ${gcls}">
          ${itTag}
          <div class="crit-head">
            <span class="crit-num">${cr._num}</span>
            <span class="crit-name">${esc(cr.name)}</span>
            <span class="crit-badge ${gcls}"><span class="dot"></span>${glbl}</span>
          </div>
          <div class="crit-summary">${esc(cr.summary||'')}</div>
          <ul class="crit-evidence">${evHtml}</ul>
          <div class="crit-conf ${confCls}">${esc(confLabel(cr.confidence))}</div>
        </div>`;
    }).join('');

    const section1 = `
      <div class="section">
        <div class="section-header">
          <div class="section-header-top">
            <div class="section-title">Section 1 — DW/Capital Flow 자동 진단</div>
            ${sectionBadge(s1Grade, 'S1')}
          </div>
          <div class="section-intent">고위드 데이터웨어하우스와 Capital Flow 실거래 데이터만으로 기계적 판단</div>
        </div>
        <div class="criteria-grid">${cardsHtml}</div>
        <div class="section-link-row">${rmBtn}</div>
      </div>`;

    /* ── Section 2 & 3: 회사별 라우팅 ─────────────────────── */
    let section2, section3;
    const renderMap = {
      '모트에이아이': [renderSection2_MotAI, renderSection3_MotAI],
      '마진맥스': [renderSection2_MarginMax, renderSection3_Pending],
      '인테이크': [renderSection2_Intake, renderSection3_Pending],
      '웰로': [renderSection2_Wello, renderSection3_Wello],
      '온오프믹스': [renderSection2_OnOffMix, renderSection3_OnOffMix],
      '와이오엘오': [renderSection2_YOELO, renderSection3_Pending],
      '메뉴잇': [renderSection2_Menuit, renderSection3_Pending],
      '젠테': [renderSection2_Jente, renderSection3_Jente],
    };
    const fns = renderMap[co.folder_name];
    if (fns) {
      section2 = fns[0](s2Grade);
      section3 = fns[1](s3Grade);
    } else {
      section2 = sectionPlaceholder('Section 2 — 제출 자료 기반 심화 진단', s2Grade, '해당 기업의 심화 진단 데이터가 준비 중입니다.');
      section3 = sectionPlaceholder('Section 3 — 인터뷰 종합 판정', s3Grade, '해당 기업의 인터뷰 종합 판정 데이터가 준비 중입니다.');
    }

    $('main').innerHTML = `
      <div class="dashboard">
        <div class="co-header">
          <div class="co-header-left">
            <div class="co-name">${esc(co.company_name)}</div>
          </div>
        </div>
        ${section1}
        <div class="section-divider"></div>
        ${section2}
        <div class="section-divider"></div>
        ${section3}
      </div>`;
  }

  /* ── Section 2: 모트에이아이 ────────────────────────────────── */
  function renderSection2_MotAI() {
    return `
      <div class="section">
        <div class="section-header">
          <div class="section-header-top">
            <div class="section-title">Section 2 — 제출 자료 기반 심화 진단</div>
            <span class="grade-badge gb-red" style="font-size:9px;padding:3px 9px 3px 7px;margin-left:auto;">
              <span class="dot" style="width:6px;height:6px;"></span>S2: RED
            </span>
          </div>
          <div class="section-intent">기업이 제출한 재무제표, 사업계획서, 보완자료를 반영한 정성 판단</div>
        </div>

        <div class="s2-grid">

          <!-- 카드 1: 사업 개요 -->
          <div class="s2-card">
            <div class="s2-card-title">사업 개요</div>
            <ul class="s2-info-list">
              <li>AI 에이전트 B2B 컨설팅/개발 (전신: 두물머리)</li>
              <li>금융사 25개 프로젝트 경험 (유진투자증권, 한국투자신탁운용, IBK 등)</li>
              <li>직원 8명, 설립 2015년 (10년차)</li>
            </ul>
          </div>

          <!-- 카드 2: 재무 추이 -->
          <div class="s2-card">
            <div class="s2-card-title">재무 추이 (단위: 억원)</div>
            <table class="fin-table">
              <thead>
                <tr>
                  <th>년도</th>
                  <th>매출</th>
                  <th>OP</th>
                  <th>순이익</th>
                  <th>자본</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>2022</td>
                  <td>5.7</td>
                  <td class="val-neg">-170.5</td>
                  <td class="val-neg">-177.0</td>
                  <td class="val-pos">126.3</td>
                </tr>
                <tr>
                  <td>2023</td>
                  <td>8.2</td>
                  <td class="val-neg">-85.6</td>
                  <td class="val-neg">-81.5</td>
                  <td class="val-pos">44.7</td>
                </tr>
                <tr>
                  <td>2024</td>
                  <td>11.5</td>
                  <td class="val-neg">-138.2</td>
                  <td class="val-neg">-338.7</td>
                  <td class="val-neg">-291.3</td>
                </tr>
                <tr>
                  <td class="val-highlight">2025</td>
                  <td class="val-highlight">11.8</td>
                  <td class="val-pos">+1.2</td>
                  <td class="val-neg">-2.7</td>
                  <td class="val-neg">-294.1</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- 카드 3: 부채 상세 구조 -->
          <div class="s2-card">
            <div class="s2-card-title">부채 상세 구조</div>
            <ul class="s2-info-list">
              <li><strong>CB(전환사채)</strong> 22.1억 — 출자전환 미완료</li>
              <li><strong>금융권 대출</strong> 20.2억 (기보, RCPS, 단기)</li>
              <li><strong>이자비용</strong> 연 2.5억 (OP 1.2억 초과)</li>
              <li><strong>자본잠식</strong> -294.1억</li>
            </ul>
          </div>

          <!-- 카드 4: 2026 매출 파이프라인 -->
          <div class="s2-card">
            <div class="s2-card-title">2026 매출 파이프라인</div>
            <div class="pipeline-row" style="margin-bottom:12px;">
              <div class="pipeline-item">
                <span class="pipeline-label">목표</span>
                <div class="pipeline-bar-wrap"><div class="pipeline-bar bar-target" style="width:100%;background:var(--border-mid);"></div></div>
                <span class="pipeline-val">40억</span>
              </div>
              <div class="pipeline-item">
                <span class="pipeline-label">확정</span>
                <div class="pipeline-bar-wrap"><div class="pipeline-bar" style="width:12.5%;"></div></div>
                <span class="pipeline-val">5억</span>
              </div>
              <div class="pipeline-item">
                <span class="pipeline-label">가능성↑</span>
                <div class="pipeline-bar-wrap"><div class="pipeline-bar bar-possible" style="width:37.5%;"></div></div>
                <span class="pipeline-val">15억</span>
              </div>
            </div>
            <ul class="s2-info-list">
              <li>유진투자증권 AI UTS (5억 확정)</li>
              <li>한투신탁 POC 확대</li>
              <li>베리타AI 협업</li>
            </ul>
          </div>

          <!-- 카드 5: 주주 구성 -->
          <div class="s2-card">
            <div class="s2-card-title">주주 구성 (2025.12 기준)</div>
            <table class="fin-table">
              <thead>
                <tr>
                  <th>주주명</th>
                  <th>유형</th>
                  <th style="text-align:right;">지분율</th>
                </tr>
              </thead>
              <tbody>
                <tr><td>천영록 (대표)</td><td>보통주</td><td style="text-align:right;">27.85%</td></tr>
                <tr><td>개인투자자 (와디즈)</td><td>보통주</td><td style="text-align:right;">28.88%</td></tr>
                <tr><td>한화자산운용</td><td>RCPS</td><td style="text-align:right;">10.31%</td></tr>
                <tr><td>송락현</td><td>보통주</td><td style="text-align:right;">10.61%</td></tr>
                <tr><td>박지수</td><td>보통주</td><td style="text-align:right;">9.55%</td></tr>
                <tr><td>이승규</td><td>보통주</td><td style="text-align:right;">5.30%</td></tr>
